// =============================================================
// Anti-cheat — five detection signatures
// =============================================================
function registerTapForCheatCheck(now, x, y) {
  if (state.lastTapTime > 0) {
    const interval = now - state.lastTapTime;
    if (interval >= MULTITOUCH_WINDOW_MS && interval < 2000) {
      state.tapIntervals[state.tapIntervalIdx] = interval;
      state.tapXs[state.tapIntervalIdx]        = x;
      state.tapYs[state.tapIntervalIdx]        = y;
      state.tapIntervalIdx = (state.tapIntervalIdx + 1) % CHEAT_BUFFER_SIZE;
      if (state.tapIntervalCount < CHEAT_BUFFER_SIZE) state.tapIntervalCount++;
      state.lastTapTime = now;
    } else if (interval >= 2000) {
      // Long gap — reset the buffer
      state.tapIntervalCount = 0;
      state.tapIntervalIdx   = 0;
      state.lastTapTime      = now;
    }
    // else: multitouch — do not update lastTapTime
  } else {
    state.lastTapTime = now;
  }

  if (state.tapIntervalCount < CHEAT_BUFFER_SIZE) return false;

  let sum = 0, minI = Infinity, maxI = -Infinity;
  for (let i = 0; i < CHEAT_BUFFER_SIZE; i++) {
    const v = state.tapIntervals[i];
    sum += v;
    if (v < minI) minI = v;
    if (v > maxI) maxI = v;
  }
  const mean = sum / CHEAT_BUFFER_SIZE;
  let sq = 0;
  for (let i = 0; i < CHEAT_BUFFER_SIZE; i++) {
    const d = state.tapIntervals[i] - mean;
    sq += d * d;
  }
  const std = Math.sqrt(sq / CHEAT_BUFFER_SIZE);
  const cv  = (mean > 0) ? (std / mean) : 1.0;

  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  for (let i = 0; i < CHEAT_BUFFER_SIZE; i++) {
    const px = state.tapXs[i], py = state.tapYs[i];
    if (px < xMin) xMin = px; if (px > xMax) xMax = px;
    if (py < yMin) yMin = py; if (py > yMax) yMax = py;
  }
  const spatialSpread = Math.max(xMax - xMin, yMax - yMin);

  // Signature 1: very low coefficient of variation + fast mean interval
  if (cv < 0.10 && mean < 170.0) return true;
  // Signature 2: tiny spread in recent intervals + fast pace
  const spread = maxI - minI;
  if (spread <= 20 && mean < 200.0) return true;
  // Signature 3: last 5 taps — near-zero interval spread + fast pace
  let sum5 = 0, min5 = Infinity, max5 = -Infinity;
  let x5Min = Infinity, x5Max = -Infinity, y5Min = Infinity, y5Max = -Infinity;
  for (let k = 0; k < 5; k++) {
    const i = (state.tapIntervalIdx - 1 - k + CHEAT_BUFFER_SIZE) % CHEAT_BUFFER_SIZE;
    const v = state.tapIntervals[i];
    sum5 += v;
    if (v < min5) min5 = v;
    if (v > max5) max5 = v;
    const px = state.tapXs[i], py = state.tapYs[i];
    if (px < x5Min) x5Min = px; if (px > x5Max) x5Max = px;
    if (py < y5Min) y5Min = py; if (py > y5Max) y5Max = py;
  }
  const mean5    = sum5 / 5.0;
  const spread5  = max5 - min5;
  const spatial5 = Math.max(x5Max - x5Min, y5Max - y5Min);
  if (spread5 <= 10 && mean5 < 220.0) return true;
  // Signature 4: all taps cluster in a tiny spatial area + fast pace
  if (spatialSpread < 50 && mean < 200.0) return true;
  // Signature 5: last 5 taps — tiny spatial cluster + fast pace
  if (spatial5 < 35 && mean5 < 230.0) return true;

  return false;
}

function triggerCheatPenalty() {
  const now = performance.now();
  state.cheatPenaltyUntil = now + 3000;
  state.tempo             = 0;
  state.tapIntervalCount  = 0;
  state.tapIntervalIdx    = 0;
  applyTempoScale();
  applyHeat();
  hideMotivation();
  state.lastMotivationTier = -1;
  state.pendingScore = Math.max(0, state.pendingScore - 50);
  state.score        = Math.min(state.score, state.pendingScore);
  updateScoreText();
  persist();
  if (now - state.lastCheatWarnAt > 2000) {
    state.lastCheatWarnAt = now;
    showCheatWarning();
    vibrate([40, 80, 40, 80, 40]);
  }
}

// =============================================================
// Main tap handler
// =============================================================
// Anti-cheat can be toggled off without removing the detection code.
// Flip this to `true` to re-enable detection + penalty.
const ANTICHEAT_ENABLED = false;

function onGooseTap(x, y) {
  if (state.exploding) return;
  const now = performance.now();
  if (ANTICHEAT_ENABLED) {
    if (now < state.cheatPenaltyUntil) return;
    if (registerTapForCheatCheck(now, x, y)) {
      triggerCheatPenalty();
      return;
    }
  }
  state.pendingScore++;
  AudioPool.play();
  animateGoose();

  // Switch to open-beak frame briefly
  state.quackingRequests++;
  state.quack = true;
  setTimeout(() => {
    state.quackingRequests--;
    if (state.quackingRequests <= 0) {
      state.quackingRequests = 0;
      state.quack = false;
    }
  }, 220);

  spawnTapFx(x, y);
  scareCubes(x, y);
  vibrate(20);
  flyPointToScore(x, y);

  // Reset sadness timer
  state.sad = false;
  if (state.sadnessTimeout) clearTimeout(state.sadnessTimeout);
  state.sadnessTimeout = setTimeout(() => { state.sad = true; }, SADNESS_DELAY_MS);

  // Rate-based tempo: just register the timestamp. The main render loop
  // computes taps-per-second over a 1s window and advances state.tempo.
  state.tapTimes.push(now);
  state.lastTapAt = now;
}

// Minimum wall-clock gap between two praise banners, in ms. Prevents the
// motivator stack from spam-firing during the +10000 explosion shower
// (which calls onPointArrived 10000 times across ~1 second of fly-in).
const PRAISE_MIN_GAP_MS = 1500;

function onPointArrived() {
  state.score++;
  updateScoreText();
  pulseEl(scoreEl, 1.18, 260);

  // Praise banner every 100 points — but rate-limited to one per
  // PRAISE_MIN_GAP_MS so a big bonus (explosion, cube pop) doesn't fire
  // dozens of overlapping banners.
  if (state.score > 0 && state.score % 100 === 0 && state.score !== state.lastMilestoneShown) {
    const now = performance.now();
    if (now - state.lastPraiseAt >= PRAISE_MIN_GAP_MS) {
      state.lastMilestoneShown = state.score;
      state.lastPraiseAt       = now;
      showPraise();
      vibrate([0, 80, 60, 80, 60, 150]);
    }
    // If still inside the cooldown, skip this milestone entirely — do
    // NOT record it as shown, so the next milestone after cooldown will
    // fire normally.
  }
  if (state.score % 25 === 0) persist();
}

// Award a bonus chunk of points in O(1). Used by big bonuses (explosion
// +10000, cube pop +100) so we don't slam onPointArrived() in a loop —
// 10000 calls to el.animate() on a single element + 10000 textContent
// writes was freezing the main thread for ~30s after the deer cutscene.
function onBonusArrived(value) {
  if (value <= 0) return;
  if (value === 1) { onPointArrived(); return; }

  state.score += value;
  updateScoreText();
  pulseEl(scoreEl, 1.28, 360); // Slightly bigger pulse for a chunk award

  // Fire at most ONE praise banner for the entire chunk, gated by the
  // global cooldown. The bonus banner (showBonusBanner) already calls out
  // the +10000 separately, so we don't need to spam multiple milestones.
  const crossedMilestone = state.score >= 100 && Math.floor(state.score / 100) !== Math.floor((state.score - value) / 100);
  if (crossedMilestone && state.score !== state.lastMilestoneShown) {
    const now = performance.now();
    if (now - state.lastPraiseAt >= PRAISE_MIN_GAP_MS) {
      state.lastMilestoneShown = state.score;
      state.lastPraiseAt       = now;
      showPraise();
      vibrate([0, 80, 60, 80, 60, 150]);
    }
  }
  persist();
}

function triggerExplode() {
  if (state.exploding) return;
  state.exploding = true;
  state.animQueue = null;

  state.explodeCount++;
  updateExplodeText();
  pulseEl(explodeEl, 1.4, 420);
  hideMotivation();
  state.lastMotivationTier = -1;
  state.heat  = 0;
  state.tempo = 0;
  state.tapTimes.length = 0;

  // Use the actual descended position so the explosion happens AT the
  // spike contact point rather than at the resting goose center.
  const c0    = gooseCenter();
  const explX = c0.x + state.gooseSwayX;
  const explY = c0.y + state.gooseDescentY;
  spawnExplode(explX, explY);
  AudioPool.playPop();

  state.pendingScore += EXPLODE_BONUS;
  persist();
  spawnBonusPoints(explX, explY, EXPLODE_BONUS);
  showBonusBanner(EXPLODE_BONUS);

  vibrate([0, 90, 30, 60, 25, 140, 35, 70, 30, 180, 40, 90, 30, 120, 35, 60, 40, 80]);

  flashScreen();

  // Reset descent so the deer hatches at the impact point and the next
  // goose respawn lands back at center.
  state.gooseDescentY = 0;
  state.gooseSwayX    = 0;

  // Hide goose; spawn deer (which then triggers respawn when it flies off).
  state.gooseHidden = true;
  setTimeout(() => {
    spawnTapFx(explX, explY);
    spawnDeer(explX, explY);
  }, 420);
}

// =============================================================
// Touch / mouse input — broad hit area (full canvas minus HUD)
//
// Two interaction modes share the same pointerdown:
//   - TAP: short contact (< DRAG_HOLD_MS) that doesn't move past
//     DRAG_MOVE_PX. Fires onGooseTap on release at the original point.
//   - DRAG: contact on the goose silhouette that exceeds either threshold.
//     Goose follows the finger; on release it flies off with the finger's
//     last velocity (clamped to VMAX). A hard fling also feeds tempo as
//     virtual taps (same path as shake).
// =============================================================
function inputToLocal(clientX, clientY) {
  const r = cv.getBoundingClientRect();
  return { x: clientX - r.left, y: clientY - r.top };
}

// Hit-test the visible goose silhouette as an ellipse around its current
// rendered center. Tolerance is generous on touchscreens.
function _gooseEllipseHit(x, y) {
  if (state.exploding || state.gooseHidden) return false;
  const c    = gooseCenter();
  const cx   = c.x + state.gooseSwayX + state.gooseBumpX;
  const cy   = c.y + state.gooseAnimTranslateY + state.gooseDescentY + state.gooseBumpY;
  const size = gooseBaseSize() * Math.max(state.gooseBaseScale, 0.25);
  // Slightly bigger than the visible silhouette so fingers don't slip off.
  const rx   = size * 0.50;
  const ry   = size * 0.55;
  const dx   = (x - cx) / rx;
  const dy   = (y - cy) / ry;
  return (dx * dx + dy * dy) <= 1;
}

const DRAG_MOVE_PX     = 12;     // movement past this = it's a drag, not a tap
const DRAG_HOLD_MS     = 220;    // holding longer than this = it's a drag
const FLING_SAMPLE_MS  = 90;     // window for last-known velocity on release
const FLING_TEMPO_MIN  = 900;    // px/s release speed needed to add a virtual tap
const FLING_TEMPO_MAX_PER_S = 18;// cap virtual taps from flings (per second)
const BUMP_SCORE_MIN_SPEED  = 400;  // px/s wall-impact speed to award a point
const BUMP_SCORE_COOLDOWN_MS = 140; // anti-spam between scoring bumps
const BUMP_SCORE_VMAX_BONUS  = 1500;// above this hit-speed, +2 points instead of +1

// Active pointer drag bookkeeping.
let _drag = null;        // { id, downX, downY, downAt, lastX, lastY, samples[], moved, locked, started }
let _flingTapsThisSec = 0;
let _flingTapsResetAt = 0;

function _resetDrag() { _drag = null; }

function _beginDrag(now) {
  if (!_drag) return;
  _drag.started = true;
  // Freeze physics so the goose snaps to the finger crisply.
  state.gooseVX = 0;
  state.gooseVY = 0;
}

function _onPointerDown(id, x, y, clientX, clientY) {
  // Only one active drag at a time — a second finger is ignored for drag
  // but still falls through to tap-if-released-quickly logic at the end.
  const now = performance.now();
  if (_drag) return false;
  // Capture the finger → rendered-goose-center offset NOW, at the very moment
  // of contact — not later when drag actually starts. The goose is rendered
  // at gooseCenter + sway + bump (+ anim/descent on Y), and we want the
  // grabbed point to stay glued to the finger throughout the drag.
  const c   = gooseCenter();
  const cgx = c.x + state.gooseSwayX + state.gooseBumpX;
  const cgy = c.y + state.gooseAnimTranslateY + state.gooseDescentY + state.gooseBumpY;
  _drag = {
    id,
    downX: x, downY: y,
    lastX: x, lastY: y,
    downAt: now,
    samples: [{ t: now, x, y }],
    moved: false,
    started: false,           // becomes true once we cross drag threshold
    onGoose: _gooseEllipseHit(x, y),
    grabOffsetX: x - cgx,     // preserved throughout the drag
    grabOffsetY: y - cgy,
  };
  return true;
}

function _onPointerMove(id, x, y) {
  if (!_drag || _drag.id !== id) return;
  const now = performance.now();
  const dxFromDown = x - _drag.downX;
  const dyFromDown = y - _drag.downY;
  const movedFar   = (dxFromDown * dxFromDown + dyFromDown * dyFromDown) >= DRAG_MOVE_PX * DRAG_MOVE_PX;
  const heldLong   = (now - _drag.downAt) >= DRAG_HOLD_MS;
  if (!_drag.started && _drag.onGoose && (movedFar || heldLong)) {
    _beginDrag(now);
  }
  _drag.lastX = x;
  _drag.lastY = y;
  if (movedFar) _drag.moved = true;
  // Trim old samples out of the velocity window.
  _drag.samples.push({ t: now, x, y });
  while (_drag.samples.length > 2 && (now - _drag.samples[0].t) > FLING_SAMPLE_MS) {
    _drag.samples.shift();
  }
  if (_drag.started && !state.exploding && !state.gooseHidden) {
    // Keep the original grab point under the finger — the goose moves so
    // that (rendered center + grabOffset) == finger position.
    const c   = gooseCenter();
    const ox  = _drag.grabOffsetX || 0;
    const oy  = _drag.grabOffsetY || 0;
    state.gooseBumpX = (x - ox) - c.x - state.gooseSwayX;
    state.gooseBumpY = (y - oy) - c.y - state.gooseAnimTranslateY - state.gooseDescentY;
  }
}

function _onPointerUp(id, x, y) {
  if (!_drag || _drag.id !== id) return;
  const d = _drag;
  _resetDrag();
  const now = performance.now();
  if (!d.started) {
    // Treat as a tap at the original press point if it's quick + steady.
    if (!d.moved && (now - d.downAt) < DRAG_HOLD_MS) {
      onGooseTap(d.downX, d.downY);
    }
    return;
  }
  // Fling: derive velocity from the most recent samples.
  const samples = d.samples;
  if (samples.length >= 2) {
    const a = samples[0];
    const b = samples[samples.length - 1];
    const dt = Math.max(1, b.t - a.t) / 1000;
    let vx = (b.x - a.x) / dt;
    let vy = (b.y - a.y) / dt;
    const VMAX = 2600;
    vx = Math.max(-VMAX, Math.min(VMAX, vx));
    vy = Math.max(-VMAX, Math.min(VMAX, vy));
    state.gooseVX = vx;
    state.gooseVY = vy;
    const speed = Math.hypot(vx, vy);
    // Strong fling — feed tempo like a virtual tap (rate-limited so users
    // can't farm tempo by repeatedly flinging hard).
    if (speed >= FLING_TEMPO_MIN) {
      if (now - _flingTapsResetAt > 1000) {
        _flingTapsResetAt = now;
        _flingTapsThisSec = 0;
      }
      const burst = (speed >= FLING_TEMPO_MIN * 2) ? 3 : (speed >= FLING_TEMPO_MIN * 1.5) ? 2 : 1;
      const allowed = Math.max(0, FLING_TEMPO_MAX_PER_S - _flingTapsThisSec);
      const adds = Math.min(burst, allowed);
      for (let i = 0; i < adds; i++) {
        state.tapTimes.push(now);
      }
      _flingTapsThisSec += adds;
      if (adds > 0) state.lastTapAt = now;
    }
  }
}

cv.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const p = inputToLocal(t.clientX, t.clientY);
    _onPointerDown(t.identifier, p.x, p.y, t.clientX, t.clientY);
  }
}, { passive: false });

cv.addEventListener('touchmove', (e) => {
  // Prevent page scroll while dragging the goose.
  if (_drag && _drag.started) e.preventDefault();
  for (const t of e.changedTouches) {
    const p = inputToLocal(t.clientX, t.clientY);
    _onPointerMove(t.identifier, p.x, p.y);
  }
}, { passive: false });

function _touchEndHandler(e) {
  for (const t of e.changedTouches) {
    const p = inputToLocal(t.clientX, t.clientY);
    _onPointerUp(t.identifier, p.x, p.y);
  }
}
cv.addEventListener('touchend',    _touchEndHandler);
cv.addEventListener('touchcancel', _touchEndHandler);

const _MOUSE_ID = 'mouse';
let _mouseDown = false;
cv.addEventListener('mousedown', (e) => {
  // Skip if the browser also fires touch events for this interaction
  if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
  const p = inputToLocal(e.clientX, e.clientY);
  _mouseDown = _onPointerDown(_MOUSE_ID, p.x, p.y, e.clientX, e.clientY);
});
window.addEventListener('mousemove', (e) => {
  if (!_mouseDown) return;
  const p = inputToLocal(e.clientX, e.clientY);
  _onPointerMove(_MOUSE_ID, p.x, p.y);
});
window.addEventListener('mouseup', (e) => {
  if (!_mouseDown) return;
  _mouseDown = false;
  const p = inputToLocal(e.clientX, e.clientY);
  _onPointerUp(_MOUSE_ID, p.x, p.y);
});

cv.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('gesturestart', (e) => e.preventDefault());

// Long-press attach helper — fires onFire after `ms` of sustained press,
// and SWALLOWS the regular click so the button only activates on long-press.
// Adds a CSS class "holding" during the press for visual feedback.
function attachLongPress(el, onFire, ms = 550) {
  let timer = null;
  const start = (e) => {
    clearTimeout(timer);
    el.classList.add('holding');
    timer = setTimeout(() => {
      el.classList.remove('holding');
      el.classList.add('fired');
      setTimeout(() => el.classList.remove('fired'), 220);
      onFire();
    }, ms);
  };
  const cancel = () => {
    clearTimeout(timer);
    el.classList.remove('holding');
  };
  el.addEventListener('touchstart',  start,  { passive: true });
  el.addEventListener('touchend',    cancel);
  el.addEventListener('touchcancel', cancel);
  el.addEventListener('touchmove',   cancel);
  el.addEventListener('mousedown',   start);
  el.addEventListener('mouseup',     cancel);
  el.addEventListener('mouseleave',  cancel);
  // Short clicks do nothing — only long-press activates.
  el.addEventListener('click', (e) => {
    e.stopImmediatePropagation();
    e.preventDefault();
  }, true);
  // Suppress the iOS context menu that can appear on long-press.
  el.addEventListener('contextmenu', (e) => e.preventDefault());
}

// =============================================================
// Shake-to-explode — device motion triggers triggerExplode().
// On iOS 13+ requires explicit permission via user gesture, so we
// expose a small 📳 button that requests it. On other platforms we
// auto-attach the listener if motion is supported.
// =============================================================
const shakeBtn = document.getElementById('shakeBtn');
// Shake feeds the same tempo system as taps: each strong motion sample
// pushes a virtual "tap" timestamp into state.tapTimes, so the main loop
// sees a higher tps and grows state.tempo naturally toward an explosion.
// Shake never awards score directly and never calls triggerExplode().
const SHAKE_THRESHOLD = 14;        // m/s² — magnitude of accel delta to count as a sample
const SHAKE_TAP_GAP_MS = 28;       // min gap between two virtual taps; ~36 tps cap from shaking
const SHAKE_TAPS_PER_HIT = 1;      // virtual taps inserted per strong sample
let _shakeAttached = false;
let _shakeLastVirtualTapAt = -Infinity;
let _shakePrev = null;

function _hasMotionSupport() {
  return typeof window.DeviceMotionEvent !== 'undefined';
}
function _iosNeedsMotionPerm() {
  return _hasMotionSupport()
    && typeof DeviceMotionEvent.requestPermission === 'function';
}

// Physics impulse threshold is much lower than the tempo threshold:
// even a small wave should nudge the goose so it feels physically reactive.
const PHYSICS_IMPULSE_MIN = 3;     // m/s² — ignore noise floor / breathing only

function _onDeviceMotion(e) {
  const a = e.accelerationIncludingGravity || e.acceleration;
  if (!a || (a.x == null && a.y == null && a.z == null)) return;
  const cur = { x: a.x || 0, y: a.y || 0, z: a.z || 0 };
  if (_shakePrev && !state.exploding) {
    const dx = cur.x - _shakePrev.x;
    const dy = cur.y - _shakePrev.y;
    const dz = cur.z - _shakePrev.z;
    const mag = Math.sqrt(dx * dx + dy * dy + dz * dz);
    // Physical push: any meaningful motion above the noise floor moves the
    // goose. Light motion = light push, hard motion = goose flies.
    if (mag > PHYSICS_IMPULSE_MIN) {
      applyShakeImpulse(dx, dy, dz);
    }
    // Tempo boost: only strong shakes count as virtual taps.
    if (mag > SHAKE_THRESHOLD) {
      const now = performance.now();
      // Throttle so a single strong motion event — which fires many
      // devicemotion samples in rapid succession on iOS (~60Hz) —
      // doesn't push 60 fake taps in one second. Cap virtual-tap rate.
      if (now - _shakeLastVirtualTapAt >= SHAKE_TAP_GAP_MS) {
        _shakeLastVirtualTapAt = now;
        for (let i = 0; i < SHAKE_TAPS_PER_HIT; i++) {
          state.tapTimes.push(now);
        }
        state.lastTapAt = now;
      }
    }
  }
  _shakePrev = cur;
}

function _attachShakeListener() {
  if (_shakeAttached) return;
  window.addEventListener('devicemotion', _onDeviceMotion, { passive: true });
  _shakeAttached = true;
}

function _hideShakeBtn() {
  if (shakeBtn) shakeBtn.hidden = true;
}
function _showShakeBtn() {
  if (shakeBtn) shakeBtn.hidden = false;
}

// Wire up the button: tap requests permission (iOS) and attaches the
// listener; on success we hide the button. On non-iOS browsers that
// support motion we auto-attach silently.
if (shakeBtn) {
  shakeBtn.addEventListener('click', async () => {
    if (_iosNeedsMotionPerm()) {
      try {
        const res = await DeviceMotionEvent.requestPermission();
        if (res === 'granted') {
          _attachShakeListener();
          _hideShakeBtn();
        } else {
          shakeBtn.title = t('shake_denied');
          shakeBtn.textContent = '🚫';
        }
      } catch {
        shakeBtn.title = t('shake_denied');
      }
    } else if (_hasMotionSupport()) {
      _attachShakeListener();
      _hideShakeBtn();
    } else {
      shakeBtn.title = t('shake_unavailable');
      shakeBtn.disabled = true;
    }
  });
  // tooltip
  shakeBtn.title = (function(){ try { return t('shake_enable_label'); } catch { return 'Shake'; } })();
}

// Initial setup: only show the button on iOS (where a tap is required).
// On Android/desktop with motion support, attach silently.
if (_iosNeedsMotionPerm()) {
  _showShakeBtn();
} else if (_hasMotionSupport()) {
  _attachShakeListener();
} // else: no sensor at all, leave button hidden

  tapRateEl.style.pointerEvents = 'auto';
  tapRateEl.style.cursor = 'pointer';
  attachLongPress(tapRateEl, () => {
    maxTps = 0;
    Store.set('goose_max_tps', '0');
    if (tapRateEl) {
      tapRateEl.textContent = fmtNum(0) + ' / ' + fmtNum(0) + ' tps';
      // brief flash so the user sees the reset
      tapRateEl.classList.add('hot');
      setTimeout(() => { tapRateEl.classList.remove('hot'); }, 200);
    }
  });
}
const buildHashEl = document.getElementById('buildHash');
if (buildHashEl) {
  buildHashEl.style.pointerEvents = 'auto';
  attachLongPress(buildHashEl, () => {
    creditsDialog.classList.add('show');
  });
}

// =============================================================
// Sadness timer — goose looks sad when ignored
// =============================================================
state.sadnessTimeout = setTimeout(() => { state.sad = true; }, SADNESS_DELAY_MS);

// =============================================================
// Main render loop
// =============================================================
let lastFrame = performance.now();
function frame(now) {
  const dtRaw = (now - lastFrame) / 1000;
  lastFrame   = now;
  const dt    = Math.min(0.05, dtRaw); // cap delta to avoid spiral-of-death

  // Rate-based tempo (three-zone). Trim the tap buffer to the 1s window.
  // Below DECAY_BELOW: drop. In [DECAY_BELOW..GROW_AT): hold. >=GROW_AT: grow.
  // Multiple fingers still add up — only the total rate matters.
  if (!state.exploding) {
    const cutoff = now - TEMPO_RATE_WINDOW_MS;
    const tt = state.tapTimes;
    // Drop stale timestamps from the front.
    let drop = 0;
    while (drop < tt.length && tt[drop] < cutoff) drop++;
    if (drop > 0) tt.splice(0, drop);
    const tapsPerSec = tt.length; // window is exactly 1s
    // Track and persist the all-time maximum rate.
    if (tapsPerSec > maxTps) {
      maxTps = tapsPerSec;
      Store.set('goose_max_tps', String(maxTps));
    }
    // Update the on-screen rate meter: current / max.
    if (tapRateEl) {
      tapRateEl.textContent = fmtNum(tapsPerSec) + ' / ' + fmtNum(maxTps) + ' tps';
      tapRateEl.classList.toggle('hot', tapsPerSec >= 28);
    }
    let tempoRate = 0;
    if (tapsPerSec >= TEMPO_GROW_AT)         tempoRate =  TEMPO_GROW_PER_SEC;
    else if (tapsPerSec < TEMPO_DECAY_BELOW) tempoRate = -TEMPO_DECAY_PER_SEC;
    state.tempo = Math.max(0, state.tempo + tempoRate * dt);
    // Are we currently growing the tempo bar? Background-cube spawning
    // is gated by this flag (cubes only appear while we're actively
    // pushing tempo upward; they don't refill on their own).
    state.tempoGrowing = (tempoRate > 0);
    // The tempo bar caps at TEMPO_EXPLODE for visuals, but the actual
    // explosion is triggered when the descended goose physically meets
    // the spike row below.
    if (state.tempo > TEMPO_EXPLODE) state.tempo = TEMPO_EXPLODE;
    applyTempoScale();
    applyHeat();
    stepGooseDescent(dt);
    stepGooseBump(dt);
    updateMotivation();
    if (gooseTouchingSpikes()) {
      triggerExplode();
    }
  }

  // Clear canvas
  ctx.clearRect(0, 0, W, H);

  drawBackground(dt);

  // Update and cull particles
  for (let i = sparks.length - 1; i >= 0; i--) {
    sparks[i].update(dt);
    if (sparks[i].t > sparks[i].life) sparks.splice(i, 1);
  }
  for (let i = feathers.length - 1; i >= 0; i--) {
    feathers[i].update(dt);
    if (feathers[i].t > feathers[i].life) feathers.splice(i, 1);
  }
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].t += dt;
    if (ripples[i].t > ripples[i].life) ripples.splice(i, 1);
  }
  // Trim oldest when exceeding hard caps (prevents frame-rate collapse on Safari).
  if (sparks.length   > MAX_SPARKS)   sparks.splice(0,   sparks.length   - MAX_SPARKS);
  if (feathers.length > MAX_FEATHERS) feathers.splice(0, feathers.length - MAX_FEATHERS);
  if (ripples.length  > MAX_RIPPLES)  ripples.splice(0,  ripples.length  - MAX_RIPPLES);

  // Draw sparks beneath the goose
  for (const s of sparks) {
    const p      = s.t / s.life;
    const alpha  = Math.max(0, 1 - p);
    const glowA  = alpha * 0.35;
    const r      = s.size * (1.8 + p * 0.8);
    ctx.globalAlpha = glowA;
    ctx.fillStyle   = s.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
    const coreA = Math.min(1, alpha + 30 / 255);
    ctx.globalAlpha = coreA;
    const sz = s.size * (1 - p * 0.4);
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation + p * 3.8);
    ctx.fillRect(-sz, -sz, sz * 2, sz * 2);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Smoothly ease sadness toward its target (matches Android ±0.06 lerp).
  {
    const target = state.sad ? 1 : 0;
    state.sadness += (target - state.sadness) * 0.06;
    if (Math.abs(target - state.sadness) < 0.003) state.sadness = target;
  }

  // Draw goose with current transform
  updateGooseAnim(dt);
  updateRespawn(dt);
  drawGoose();

  // Post-explosion deer cutscene (drawn over the empty stage while the
  // goose is hidden, before ripple/feather overlays).
  updateDeer(dt);
  drawDeer();

  // Draw ripple rings on top of goose
  for (const r of ripples) {
    const p      = r.t / r.life;
    const radius = r.startR + (r.endR - r.startR) * (1 - Math.pow(1 - p, 3));
    const alpha  = 180 * (1 - p) / 255;
    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, alpha)})`;
    ctx.lineWidth   = 4 + 2 * (1 - p);
    ctx.beginPath();
    ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Draw feathers on top of everything
  for (const f of feathers) {
    const p     = f.t / f.life;
    const alpha = Math.max(0, 1 - p * 1.1);
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation);
    ctx.fillStyle   = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.w / 2, f.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(60,70,80,${alpha * 0.6})`;
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// =============================================================
// Init
// =============================================================
applyTempoScale();
applyHeat();
persist();

// PWA: register service worker for installability and offline support.
// Also reloads the page automatically when a new SW takes control —
// critical for iOS home-screen PWAs which otherwise never see updates.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      // Check for updates on every launch and whenever the tab regains focus.
      try { reg.update(); } catch(_) {}
      window.addEventListener('focus', () => { try { reg.update(); } catch(_) {} });

      // When a new SW is installed and waiting, activate it immediately.
      function promptUpdate(sw) {
        if (!sw) return;
        if (sw.state === 'installed' && navigator.serviceWorker.controller) {
          sw.postMessage('SKIP_WAITING');
        }
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            sw.postMessage('SKIP_WAITING');
          }
        });
      }
      promptUpdate(reg.waiting);
      reg.addEventListener('updatefound', () => promptUpdate(reg.installing));
    }).catch(() => {});

    // Reload exactly once when a new SW takes over (after skipWaiting).
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloading) return;
      reloading = true;
      window.location.reload();
    });
  });
}

// Build hash — fetches the latest commit short-hash from version.txt
// and shows it in the bottom-left corner. Cache-busted with a timestamp
// so users always see the live deployed commit.
(() => {
  const el = document.getElementById('buildHash');
  if (!el) return;
  fetch('version.txt?t=' + Date.now(), { cache: 'no-store' })
    .then(r => r.ok ? r.text() : '')
    .then(txt => {
      const hash = (txt || '').trim().slice(0, 7);
      if (hash) {
        el.textContent = hash;
        // Re-render credits so the freshly-loaded hash shows up there too.
        if (typeof renderCredits === 'function') renderCredits();
      }
    })
    .catch(() => {});
})();

</script>
</body>
