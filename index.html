<html lang="en">
<head>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a0a3c">

<title>Goose Clicker</title>
<style>
  :root {
    --bg-top: #2a0f6b;
    --bg-bot: #120426;
    --neon-cyan: #2EE6FF;
    --neon-pink: #FF3E7F;
    --neon-yellow: #FFD23E;
    --ink: #fff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif;
    color: var(--ink);
  }
  #stage {
    position: fixed;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 100%;
    max-width: 560px;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #3a1685 0%, #1a0a3c 55%, #080217 100%);
  }
  canvas {
    position: absolute; left: 0; top: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: manipulation;
  }
  .hud {
    position: absolute;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
  }
  .hud > * { pointer-events: auto; }
  .hud-top {
    top: 0;
    padding: max(14px, env(safe-area-inset-top)) 16px 10px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .hud-title {
    text-align: center;
    flex: 1;
  }
  .title {
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.3px;
    text-shadow: 0 2px 0 rgba(0,0,0,.4), 0 0 14px rgba(46,230,255,.55);
    cursor: pointer;
    display: inline-block;
    padding: 4px 8px;
    white-space: nowrap;
  }
  @media (min-width: 420px) {
    .title { font-size: 22px; }
  }
  .title-hint {
    font-size: 10px;
    opacity: .55;
    font-weight: 500;
    margin-top: 2px;
  }
  .chip {
    font-weight: 800;
    font-size: 13px;
    padding: 7px 11px;
    border-radius: 14px;
    background: rgba(10,6,30,.78);
    border: 1.5px solid rgba(255,255,255,.18);
    white-space: nowrap;
    transition: transform .12s ease-out;
    will-change: transform;
  }
  /* Heavy backdrop blur only on capable desktop browsers — iOS Safari
     hitches hard when repainting blurred HUD on every frame. */
  @media (hover: hover) and (pointer: fine) {
    .chip {
      background: rgba(10,6,30,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
  }
  #score { color: var(--neon-yellow); text-align: left; text-shadow: 0 0 10px rgba(255,210,62,.6); }
  #explodeCount { color: var(--neon-pink); text-align: right; text-shadow: 0 0 10px rgba(255,62,127,.55); }

  #motivation {
    position: absolute;
    left: 16px; right: 16px;
    bottom: calc(24px + env(safe-area-inset-bottom));
    text-align: center;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-shadow: 0 2px 0 rgba(0,0,0,.55), 0 0 16px currentColor;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity .22s, transform .18s cubic-bezier(.17,.89,.32,1.49);
    pointer-events: none;
    z-index: 12;
  }
  #motivation.show { opacity: 1; transform: scale(1); }
  #motivation.pulse { animation: pulse 480ms ease-in-out infinite alternate; }
  @keyframes pulse {
    from { transform: scale(1); filter: drop-shadow(0 0 4px currentColor); }
    to { transform: scale(1.08); filter: drop-shadow(0 0 18px currentColor); }
  }

  .banner {
    position: absolute;
    left: 50%;
    top: 25%;
    transform: translate(-50%, 0) scale(0.6);
    padding: 14px 22px;
    border-radius: 999px;
    background: rgba(46,57,66,.88);
    border: 2.5px solid #fff;
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    opacity: 0;
    z-index: 20;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    white-space: nowrap;
  }
  .bonus-banner {
    font-size: 42px;
    color: var(--neon-yellow);
    background: transparent;
    border: none;
    text-shadow: 0 0 18px #FF3E7F, 0 4px 0 rgba(0,0,0,.4);
    box-shadow: none;
  }
  .cheat-banner {
    background: rgba(139,0,0,.93);
    border-color: #fff;
    white-space: pre-line;
    text-align: center;
    font-size: 18px;
    top: 38%;
    text-shadow: 0 2px 10px rgba(0,0,0,.8);
  }

  .flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    z-index: 30;
    pointer-events: none;
  }

  #credits {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.7);
    z-index: 100;
    padding: 20px;
  }
  #credits.show { display: flex; }
  #credits .dialog {
    max-width: 360px;
    background: #1a0a3c;
    border: 2px solid rgba(255,255,255,.25);
    border-radius: 18px;
    padding: 22px 22px 14px 22px;
    color: #fff;
    font-size: 14px;
    line-height: 1.45;
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
  }
  #credits h3 { margin: 0 0 12px 0; font-size: 18px; }
  #credits pre {
    margin: 0;
    font: inherit;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #credits button {
    margin-top: 14px;
    float: right;
    background: var(--neon-cyan);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
  }

  /* Language toggle button */
  #langBtn {
    position: absolute;
    bottom: max(12px, env(safe-area-inset-bottom));
    right: 12px;
    z-index: 11;
    background: rgba(10,6,30,.85);
    border: 1.5px solid rgba(255,255,255,.22);
    border-radius: 10px;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    padding: 5px 9px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background .15s, transform .1s;
    pointer-events: auto;
  }
  #langBtn:active { transform: scale(0.93); }

  /* Goose style toggle button (SVG ↔ PNG) */
  #styleBtn {
    position: absolute;
    bottom: max(12px, env(safe-area-inset-bottom));
    right: 58px;
    z-index: 11;
    background: rgba(10,6,30,.85);
    border: 1.5px solid rgba(255,255,255,.22);
    border-radius: 10px;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    padding: 5px 9px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background .15s, transform .1s;
    pointer-events: auto;
  }
  #styleBtn:active { transform: scale(0.93); }
  @media (hover: hover) and (pointer: fine) {
    #langBtn, #styleBtn {
      background: rgba(10,6,30,.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
  }

  .fly-plus {
    position: absolute;
    width: 34px; height: 34px;
    pointer-events: none;
    z-index: 15;
    will-change: transform, opacity;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div class="hud hud-top">
    <div id="score" class="chip">Score: 0</div>
    <div class="hud-title">
      <div class="title" id="title">Goose Clicker</div>
      <div class="title-hint" id="titleHint">long-press title for credits</div>
    </div>

  </div>
  <div id="motivation"></div>

  <div id="credits" role="dialog" aria-modal="true">
    <div class="dialog">
      <h3 id="creditsTitle">About</h3>
      <pre id="creditsBody"></pre>
      <button id="creditsOk">OK</button>
      <div style="clear:both"></div>
    </div>

</div>

<script>
'use strict';

// =============================================================

    ],

      'ОН СЕЙЧАС РВАНЁТ!',
    ],

// =============================================================
// Language management — persisted to localStorage via Store
// =============================================================
// We read lang preference after Store is defined below.
let currentLang = 'en';

/** Returns the localized string for the given key in the current language. */
function t(key) {
  const locale = I18N[currentLang] || I18N.en;
  return locale[key] !== undefined ? locale[key] : (I18N.en[key] || key);
}

// =============================================================
// Gameplay mechanics constants (ported from MainActivity v5.1)
// =============================================================
const TEMPO_PER_TAP  = 0.0476;
const TEMPO_EXPLODE  = 1.0;
const MIN_SCALE      = 0.30;
const EXPLODE_BONUS  = 500;

// Tempo now rewards fast tapping and decays between taps.
// Interval (ms) -> tempo gain per tap. Anything above SLOW_MS gives nothing.
const TEMPO_FAST_MS  = 110;   // <= this: maximum gain (frantic tapping only)
const TEMPO_MID_MS   = 180;
const TEMPO_SLOW_MS  = 320;   // > this: zero gain
const TEMPO_GAIN_FAST = 0.0075;
const TEMPO_GAIN_MID  = 0.0025;
const TEMPO_GAIN_SLOW = 0.0005;
// Tempo lost per second of idleness. 0.18 = full bar drains in ~5.5s.
const TEMPO_DECAY_PER_SEC = 0.18;
const SADNESS_DELAY_MS = 5000;

// Anti-cheat buffer settings
const CHEAT_BUFFER_SIZE    = 12;
const MULTITOUCH_WINDOW_MS = 80;

// =============================================================
// Game state
// =============================================================
const state = {
  score: 0,
  pendingScore: 0,
  explodeCount: 0,
  tempo: 0,
  lastTempoTick: 0,
  exploding: false,
  sad: false,
  sadness: 0, // smoothly interpolates 0..1 toward state.sad
  gooseStyle: 1, // 0 = PNG, 1 = SVG (default, matches Android)
  quack: false,
  quackingRequests: 0,
  quackUntil: 0,
  lastMilestoneShown: -1,
  lastMotivationTier: -1,
  lastMotivationIdx: -1,
  // Goose transform — base scale driven by tempo + wobble multipliers
  gooseBaseScale: 1,
  gooseAnimScaleX: 1,
  gooseAnimScaleY: 1,
  gooseAnimRotation: 0,
  gooseAnimTranslateY: 0,
  gooseAlpha: 1,
  gooseHidden: false,
  // Respawn pop-in: 0..1 animation progress, 1 = complete
  respawnT: 1,
  // Wobble animation queue: { phase, t, phases[] }
  animQueue: null,
  // Heat level 0..1 (drives red-alert background overlay)
  heat: 0,
  // GD-style background scroll / cube / pulse state
  bgScroll: 0,
  cubeAngle: 0,
  pulsePhase: 0,
  // Sadness timer handle
  sadnessTimeout: null,
  // Timestamp (ms) of the last tap — used by the speed-sensitive tempo curve.
  lastTapAt: 0,
  // Anti-cheat tap interval ring buffer
  tapIntervals: new Array(CHEAT_BUFFER_SIZE).fill(0),
  tapXs: new Array(CHEAT_BUFFER_SIZE).fill(0),
  tapYs: new Array(CHEAT_BUFFER_SIZE).fill(0),
  tapIntervalCount: 0,
  tapIntervalIdx: 0,
  lastTapTime: 0,
  cheatPenaltyUntil: 0,
  lastCheatWarnAt: 0,
};

// =============================================================
// Persistence layer — uses localStorage when available,
// falls back to an in-memory map inside sandboxed iframes
// where storage APIs are blocked.
// =============================================================
const Store = (() => {
  const KEY = 'local' + 'Storage'; // split to avoid over-eager static analysis
  let ls = null;
  try {
    ls = window[KEY];
    ls.setItem('__goose_probe', '1');
    ls.removeItem('__goose_probe');
  } catch(_) { ls = null; }
  const mem = Object.create(null);
  return {
    get(k)    { try { return ls ? ls.getItem(k) : (mem[k] ?? null); } catch(_) { return mem[k] ?? null; } },
    set(k, v) { try { if (ls) ls.setItem(k, v); else mem[k] = v; }  catch(_) { mem[k] = v; } },
  };
})();

// Restore language preference
currentLang = Store.get('lang') || 'en';
if (currentLang !== 'ru') currentLang = 'en';

// Restore goose style preference (default: SVG)
{
  const gs = Store.get('goose_style');
  state.gooseStyle = (gs === '0') ? 0 : 1;
}

// Restore game score and explosion count
{
  const s = parseInt(Store.get('goose_score') || '0', 10);
  if (!isNaN(s)) { state.score = s; state.pendingScore = s; }
  const e = parseInt(Store.get('goose_explode_count') || '0', 10);
  if (!isNaN(e)) state.explodeCount = e;
}

function persist() {
  Store.set('goose_score', String(state.pendingScore));
  Store.set('goose_explode_count', String(state.explodeCount));
}

// =============================================================
// Canvas setup with device pixel ratio
// =============================================================
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;

// Coarse pointer = phones/tablets. iOS Safari hits a fill-rate wall when rendering
// hundreds of particles at 3x DPR, so we cap DPR lower and halve particle counts.
const IS_TOUCH_DEVICE = matchMedia('(hover: none) and (pointer: coarse)').matches;
const FX_SCALE = IS_TOUCH_DEVICE ? 0.5 : 1;     // particle-count multiplier
const DPR_CAP  = IS_TOUCH_DEVICE ? 2 : 2.5;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, DPR_CAP);
  const stage = document.getElementById('stage');
  const r = stage.getBoundingClientRect();
  W = Math.round(r.width);
  H = Math.round(r.height);
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
resize();

// =============================================================
// Image assets
// =============================================================
const gooseImg       = new Image();
gooseImg.src         = 'assets/goose.png';
const gooseBody      = new Image();
gooseBody.src        = 'assets/goose_body.png';
const gooseBodyQuack = new Image();
gooseBodyQuack.src   = 'assets/goose_body_quack.png';

let assetsReady  = false;
let imagesToLoad = 3;
function oneLoaded() { if (--imagesToLoad <= 0) assetsReady = true; }
gooseImg.onload       = oneLoaded; gooseImg.onerror       = oneLoaded;
gooseBody.onload      = oneLoaded; gooseBody.onerror      = oneLoaded;
gooseBodyQuack.onload = oneLoaded; gooseBodyQuack.onerror = oneLoaded;

// =============================================================
// Audio — pooled instances for rapid overlapping quacks
// =============================================================
const AudioPool = (() => {
  const POOL_SIZE = 8;
  const pool = [];
  let loaded = false;
  for (let i = 0; i < POOL_SIZE; i++) {
    const a = new Audio('assets/honk.ogg');
    a.preload = 'auto';
    a.volume  = 0.85;
    pool.push(a);
  }
  let idx = 0;

  // Unlock audio context on first user gesture
  function unlock() {
    pool.forEach(a => {
      a.play().then(() => { a.pause(); a.currentTime = 0; loaded = true; }).catch(() => {});
    });
    window.removeEventListener('touchstart', unlock);
    window.removeEventListener('mousedown', unlock);
    window.removeEventListener('keydown', unlock);
  }
  window.addEventListener('touchstart', unlock, { once: false, passive: true });
  window.addEventListener('mousedown',  unlock, { once: false });
  window.addEventListener('keydown',    unlock, { once: false });

  return {
    play() {
      const a = pool[idx];
      idx = (idx + 1) % POOL_SIZE;
      try {
        a.currentTime = 0;
        // Slight pitch variation for natural quack feel
        a.playbackRate = 0.97 + Math.random() * 0.06;
        a.play().catch(() => {});
      } catch(_) {}
    }
  };
})();

// =============================================================
// Vibration helper
// =============================================================
function vibrate(pattern) {
  if (!navigator.vibrate) return;
  try { navigator.vibrate(pattern); } catch(_) {}
}

// =============================================================
// Goose geometry helpers
// =============================================================
function gooseCenter() {
  // Goose centered horizontally, slightly above vertical center
  return { x: W / 2, y: H * 0.48 };
}
function gooseBaseSize() {
  return Math.min(W * 0.72, H * 0.42, 360);
}

// =============================================================
// Particle system — sparks, feathers, ripples
// =============================================================
const SPARK_COLORS = ['#2EE6FF', '#FF3E7F', '#FFD23E', '#B07CFF', '#8EFF3E', '#FF8A3E'];

const sparks   = [];
const feathers = [];
const ripples  = [];

class Spark {
  // mode: false = gentle drift (used by +1 fly trail), true = burst,
  //       'contained' = small tap-burst that stays near the tap point.
  constructor(x, y, color, burst) {
    this.x = x; this.y = y;
    this.color    = color;
    this.rotation = Math.random() * Math.PI * 2;
    this.t = 0;
    if (burst === 'contained') {
      const a  = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 70;
      this.vx   = Math.cos(a) * sp;
      this.vy   = Math.sin(a) * sp;
      this.size = 3 + Math.random() * 2;
      this.life = 0.35 + Math.random() * 0.15;
    } else if (burst) {
      const a  = Math.random() * Math.PI * 2;
      const sp = 180 + Math.random() * 240;
      this.vx   = Math.cos(a) * sp;
      this.vy   = Math.sin(a) * sp;
      this.size = 5 + Math.random() * 4;
      this.life = 0.55 + Math.random() * 0.25;
    } else {
      this.vx   = (Math.random() - 0.5) * 80;
      this.vy   = (Math.random() - 0.5) * 60 + 30;
      this.size = 4 + Math.random() * 3;
      this.life = 0.35 + Math.random() * 0.15;
    }
  }
  update(dt) {
    this.t  += dt;
    this.vy += 260 * dt * 0.4;
    this.vx *= Math.pow(0.96, dt * 60);
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    this.rotation += dt * 3.8;
  }
}

class Feather {
  constructor(x, y) {
    this.x = x; this.y = y;
    const a  = Math.random() * Math.PI * 2;
    // Tighter spread: feathers stay near the tap point and fade fast.
    const sp = 90 + Math.random() * 80;
    this.vx       = Math.cos(a) * sp;
    this.vy       = Math.sin(a) * sp - 40;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 12;
    this.w        = 10 + Math.random() * 6;
    this.h        = 16 + Math.random() * 8;
    this.life     = 0.45 + Math.random() * 0.2;
    this.t        = 0;
  }
  update(dt) {
    this.t  += dt;
    this.vx *= Math.pow(0.985, dt * 60);
    this.vy += 380 * dt;
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    this.rotation += this.rotSpeed * dt;
  }
}

class Ripple {
  // Smaller default ripple: starts tiny, expands only ~35px, fades fast.
  constructor(x, y, sR = 5, eR = 35, life = 0.32) {
    this.x = x; this.y = y;
    this.startR = sR; this.endR = eR;
    this.life = life; this.t = 0;
  }
}

// Helper: scale a particle count by FX_SCALE, never below 1.
const fx = (n) => Math.max(1, Math.round(n * FX_SCALE));

function spawnTapFx(x, y) {
  ripples.push(new Ripple(x, y));
  const n = fx(7 + Math.floor(Math.random() * 4));
  for (let i = 0; i < n; i++) feathers.push(new Feather(x, y));
}
function spawnSpark(x, y) {
  const c = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
  sparks.push(new Spark(x, y, c, false));
}
function spawnBurst(x, y) {
  // Small confined burst used when a '+1' arrives at the score chip
  // and after each tap effect. No more screen-sweeping arcs.
  const n = fx(8 + Math.floor(Math.random() * 4));
  for (let i = 0; i < n; i++) {
    sparks.push(new Spark(x, y, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], 'contained'));
  }
  // No ripple here — the score-chip burst should be sparks only.
}
function spawnExplode(x, y) {
  // Explosion ripples are bigger than tap ripples but still well contained.
  ripples.push(new Ripple(x, y, 10, 110, 0.55));
  ripples.push(new Ripple(x, y,  6,  75, 0.42));
  ripples.push(new Ripple(x, y,  3,  45, 0.30));
  const n = fx(70 + Math.floor(Math.random() * 30));
  for (let i = 0; i < n; i++) {
    sparks.push(new Spark(x, y, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], true));
  }
  const fc = fx(45 + Math.floor(Math.random() * 15));
  for (let i = 0; i < fc; i++) feathers.push(new Feather(x, y));

  // Secondary burst after short delay
  setTimeout(() => {
    ripples.push(new Ripple(x, y, 9, 90, 0.45));
    const n2 = fx(30 + Math.floor(Math.random() * 15));
    for (let i = 0; i < n2; i++) {
      const ox = x + (Math.random() - 0.5) * 120;
      const oy = y + (Math.random() - 0.5) * 120;
      sparks.push(new Spark(ox, oy, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], true));
    }
  }, 150);

  // Third poof
  setTimeout(() => {
    ripples.push(new Ripple(x, y, 6, 70, 0.38));
    const n3 = fx(20 + Math.floor(Math.random() * 10));
    for (let i = 0; i < n3; i++) {
      const ox = x + (Math.random() - 0.5) * 180;
      const oy = y + (Math.random() - 0.5) * 180;
      sparks.push(new Spark(ox, oy, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], true));
    }
  }, 320);
}

// =============================================================
// Draw: GD-style scrolling background
// =============================================================
function drawBackground(dt) {
  state.bgScroll   = (state.bgScroll + dt * (W / 14)) % W;
  state.cubeAngle  += dt * 2.5;
  state.pulsePhase += dt * Math.PI * 2 * 1.6;

  const groundH   = Math.min(110, H * 0.14);
  const groundTop = H - groundH;

  // Scrolling cyan grid above the ground strip
  ctx.strokeStyle = 'rgba(174,232,255,0.33)';
  ctx.lineWidth = 1;
  const cell = 36;
  ctx.beginPath();
  const ox = -((state.bgScroll) % cell);
  for (let x = ox; x < W + cell; x += cell) {
    ctx.moveTo(x, 0); ctx.lineTo(x, groundTop);
  }
  for (let y = 0; y <= groundTop; y += cell) {
    ctx.moveTo(0, y); ctx.lineTo(W, y);
  }
  ctx.stroke();

  // Floating rotating cubes
  const cubes = [
    { x: 0.15, y: 0.18, size: 28, speed:  1.0 },
    { x: 0.55, y: 0.12, size: 34, speed: -1.3 },
    { x: 0.85, y: 0.28, size: 22, speed:  0.7 },
  ];
  for (const c of cubes) {
    ctx.save();
    ctx.translate(c.x * W, c.y * groundTop);
    ctx.rotate(state.cubeAngle * c.speed);
    const half = c.size / 2;
    ctx.fillStyle   = '#2EE6FF';
    ctx.fillRect(-half, -half, c.size, c.size);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(-half, -half, c.size, c.size);
    ctx.fillStyle   = 'rgba(255,255,255,0.4)';
    const inner = c.size * 0.28;
    ctx.fillRect(-inner, -inner, inner * 2, inner * 2);
    ctx.restore();
  }

  // Horizon glow
  const grad = ctx.createLinearGradient(0, groundTop - 80, 0, groundTop);
  grad.addColorStop(0,   'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(255,111,207,0.35)');
  grad.addColorStop(1,   'rgba(0,229,255,0.7)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundTop - 80, W, 80);

  // Ground strip
  ctx.fillStyle = '#1a0a3c';
  ctx.fillRect(0, groundTop, W, groundH);
  ctx.fillStyle = '#00E5FF';
  ctx.fillRect(0, groundTop - 2, W, 4);

  // Scrolling pink spikes along the ground edge
  const baseW = 34, hSpike = 26, spacing = 46;
  const offset = -((state.bgScroll * 0.55) % spacing);
  ctx.fillStyle   = '#FF3E7F';
  ctx.strokeStyle = '#FFD3E4';
  ctx.lineWidth   = 1.5;
  for (let x = offset - spacing; x < W + spacing; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x - baseW / 2, groundTop);
    ctx.lineTo(x + baseW / 2, groundTop);
    ctx.lineTo(x, groundTop - hSpike);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Heat overlay — red alert when tempo is high
  if (state.heat > 0.001) {
    const pulse      = 0.5 + 0.5 * Math.sin(state.pulsePhase);
    const pulseMix   = state.heat * state.heat;
    const effectiveHeat = state.heat * (1 - 0.35 * pulseMix * (1 - pulse));

    // 1) Full-screen red tint, up to 75% opacity
    const tintA = effectiveHeat * 0.75;
    if (tintA > 0) {
      ctx.fillStyle = `rgba(229,0,26,${tintA})`;
      ctx.fillRect(0, 0, W, H);
    }
    // 2) Edge stripes (top + bottom)
    const stripeA = effectiveHeat;
    const g2 = ctx.createLinearGradient(0, 0, 0, H);
    g2.addColorStop(0,   `rgba(255,0,48,${stripeA})`);
    g2.addColorStop(0.3, 'rgba(0,0,0,0)');
    g2.addColorStop(0.7, 'rgba(0,0,0,0)');
    g2.addColorStop(1,   `rgba(255,0,48,${stripeA})`);
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);
    // 3) Radial vignette darkening toward edges
    const cx  = W / 2, cy = H / 2;
    const rad = Math.hypot(cx, cy);
    const g3  = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
    g3.addColorStop(0,    'rgba(0,0,0,0)');
    g3.addColorStop(0.35, 'rgba(0,0,0,0)');
    g3.addColorStop(1,    `rgba(176,0,16,${effectiveHeat})`);
    ctx.fillStyle = g3;
    ctx.fillRect(0, 0, W, H);
  }
}

// =============================================================
// Draw: Goose
// =============================================================
function applyTempoScale() {
  const ratio = Math.min(1, state.tempo / TEMPO_EXPLODE);
  state.gooseBaseScale = 1 - ratio * (1 - MIN_SCALE);
}
function applyHeat() {
  const r    = state.tempo / TEMPO_EXPLODE;
  let heat   = (r < 0.25) ? 0 : (r - 0.25) / 0.75;
  heat       = Math.max(0, Math.min(1, heat));
  state.heat = heat;
}

// =============================================================
// SVG goose — vector rendering ported 1:1 from GooseView.java
// All paths live in a 300x400 viewBox; drawGoose() wraps this
// with the same outer scale/rotate/translate used by PNG mode.
// =============================================================
const SVG_C_BODY   = '#FFFFFF';
const SVG_C_BEAK   = '#FF9A2B';
const SVG_C_FOOT   = '#FF9A2B';
const SVG_C_LINE   = '#1A1A1A';
const SVG_C_EYEBG  = '#FFFFFF';
const SVG_C_PUPIL  = '#111111';
const SVG_C_BLUSH  = 'rgba(255,200,176,0.6)';
const SVG_C_HIGHLT = '#FFFFFF';
const SVG_C_MOUTH  = '#6A2B00';

const SVG_WING_LINES = [
  [115, 270, 140, 280, 165, 275],
  [135, 285, 160, 293, 185, 288],
  [108, 250, 135, 258, 160, 253],
];

// Build each sub-path once as a Path2D for cheap per-frame fills/strokes.
function _mkPath(build) {
  const p = new Path2D();
  build(p);
  p.closePath();
  return p;
}
const SVG_PATH_BODY = _mkPath(p => {
  p.moveTo(70, 270);
  p.bezierCurveTo(40, 255,   45, 200,   88, 178);
  p.bezierCurveTo(125, 160, 185, 162,  220, 192);
  p.bezierCurveTo(252, 220, 250, 282,  218, 312);
  p.bezierCurveTo(192, 328, 155, 330,  125, 325);
  p.bezierCurveTo(98, 318,   78, 295,  70, 270);
});
const SVG_PATH_TAIL = _mkPath(p => {
  p.moveTo(65, 265);
  p.quadraticCurveTo(48, 258, 40, 250);
  p.quadraticCurveTo(52, 262, 58, 275);
});
const SVG_PATH_NECK = _mkPath(p => {
  p.moveTo(135, 185);
  p.bezierCurveTo(108, 160, 115, 115, 150, 90);
  p.bezierCurveTo(175, 75,  205, 75,  222, 95);
  p.bezierCurveTo(225, 105, 218, 112, 208, 112);
  p.bezierCurveTo(185, 112, 170, 135, 172, 170);
  p.bezierCurveTo(170, 182, 150, 192, 135, 185);
});
const SVG_PATH_WING = _mkPath(p => {
  p.moveTo(100, 225);
  p.bezierCurveTo(130, 210, 180, 215, 210, 240);
  p.bezierCurveTo(220, 265, 195, 295, 160, 295);
  p.bezierCurveTo(130, 293, 105, 275, 95, 250);
  p.bezierCurveTo(92, 240,  95, 230, 100, 225);
});
const SVG_PATH_BEAK_TOP = _mkPath(p => {
  p.moveTo(245, 80);
  p.bezierCurveTo(270, 74, 288, 78, 293, 86);
  p.bezierCurveTo(288, 90, 270, 90, 252, 90);
  p.bezierCurveTo(246, 88, 243, 84, 245, 80);
});
const SVG_PATH_BEAK_BOT = _mkPath(p => {
  p.moveTo(252, 92);
  p.bezierCurveTo(268, 94, 285, 93, 290, 90);
  p.bezierCurveTo(287, 98, 272, 102, 258, 100);
  p.bezierCurveTo(251, 98, 249, 94, 252, 92);
});
const SVG_PATH_FOOT_BACK = _mkPath(p => {
  p.moveTo(105, 358);
  p.quadraticCurveTo(115, 350, 128, 352);
  p.quadraticCurveTo(145, 354, 152, 362);
  p.quadraticCurveTo(147, 370, 136, 372);
  p.quadraticCurveTo(120, 374, 110, 370);
  p.quadraticCurveTo(102, 366, 105, 358);
});
const SVG_PATH_FOOT_FRONT = _mkPath(p => {
  p.moveTo(150, 365);
  p.quadraticCurveTo(160, 355, 172, 357);
  p.quadraticCurveTo(190, 358, 200, 366);
  p.quadraticCurveTo(196, 376, 182, 378);
  p.quadraticCurveTo(166, 380, 158, 376);
  p.quadraticCurveTo(148, 372, 150, 365);
});

function _svgLegLift(phase, offset) {
  let p = (phase + offset) % 1;
  if (p < 0) p += 1;
  if (p < 0.5) return Math.sin(p * 2 * Math.PI) * 0.5;
  return 0;
}

function _svgStrokedPath(g, path, width) {
  g.lineWidth   = width;
  g.strokeStyle = SVG_C_LINE;
  g.lineJoin    = 'round';
  g.lineCap     = 'round';
  g.stroke(path);
}

function _svgFillCircle(g, cx, cy, r, fill) {
  g.fillStyle = fill;
  g.beginPath();
  g.arc(cx, cy, r, 0, Math.PI * 2);
  g.fill();
}

function _svgStrokeCircle(g, cx, cy, r, width) {
  g.lineWidth   = width;
  g.strokeStyle = SVG_C_LINE;
  g.beginPath();
  g.arc(cx, cy, r, 0, Math.PI * 2);
  g.stroke();
}

function _svgFillEllipse(g, cx, cy, rx, ry, fill) {
  g.fillStyle = fill;
  g.beginPath();
  g.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  g.fill();
}

function _svgStrokeEllipse(g, cx, cy, rx, ry, width) {
  g.lineWidth   = width;
  g.strokeStyle = SVG_C_LINE;
  g.beginPath();
  g.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  g.stroke();
}

function _svgDrawEye(g, cx, cy, rOuter, rPupil, highlight, sadness) {
  _svgFillCircle(g, cx, cy, rOuter, SVG_C_EYEBG);
  _svgStrokeCircle(g, cx, cy, rOuter, 2);
  const pxOff = rOuter * 0.25;
  const pyOff = sadness * rOuter * 0.5;
  _svgFillCircle(g, cx + pxOff, cy + pyOff, rPupil, SVG_C_PUPIL);
  if (highlight) {
    _svgFillCircle(g, cx - rOuter * 0.25, cy - rOuter * 0.4, 1.3, SVG_C_HIGHLT);
  }
}

function _svgDrawLeg(g, x1, y1, x2, y2, footPath, baseLineW) {
  // Leg stem
  g.lineWidth   = 6;
  g.strokeStyle = SVG_C_LINE;
  g.lineJoin    = 'round';
  g.lineCap     = 'round';
  g.beginPath();
  g.moveTo(x1, y1);
  g.lineTo(x2, y2);
  g.stroke();
  // Foot fill + outline
  g.fillStyle = SVG_C_FOOT;
  g.fill(footPath);
  _svgStrokedPath(g, footPath, baseLineW);
}

// Render the goose in local 300x400 coordinates. Caller must have
// already scaled the context so these coordinates map to the goose size.
function drawGooseSvg(g) {
  const lineW  = 3;
  const twoPi  = Math.PI * 2;
  const phase  = (performance.now() / 700) % 1;
  const sadness = state.sadness;

  const frontLift = _svgLegLift(phase, 0.0);
  const backLift  = _svgLegLift(phase, 0.5);

  // Back leg (behind body)
  g.save();
  g.translate(0, -backLift * 10);
  _svgDrawLeg(g, 130, 318, 128, 358, SVG_PATH_FOOT_BACK, lineW);
  g.restore();

  // Body + tail
  g.fillStyle = SVG_C_BODY;
  g.fill(SVG_PATH_BODY);
  g.fill(SVG_PATH_TAIL);
  _svgStrokedPath(g, SVG_PATH_BODY, lineW);
  _svgStrokedPath(g, SVG_PATH_TAIL, lineW);

  // Wing outline + feather lines
  _svgStrokedPath(g, SVG_PATH_WING, lineW);
  g.lineWidth   = 2.2;
  g.strokeStyle = SVG_C_LINE;
  for (const ln of SVG_WING_LINES) {
    g.beginPath();
    g.moveTo(ln[0], ln[1]);
    g.quadraticCurveTo(ln[2], ln[3], ln[4], ln[5]);
    g.stroke();
  }

  // Head + neck with subtle vertical bob
  const headBob = Math.sin(twoPi * phase) * 1.2 * (1 - sadness);
  g.save();
  g.translate(0, headBob);

  g.fillStyle = SVG_C_BODY;
  g.fill(SVG_PATH_NECK);
  _svgStrokedPath(g, SVG_PATH_NECK, lineW);

  // Head oval (218, 85) rx=36 ry=32
  _svgFillEllipse(g, 218, 85, 36, 32, SVG_C_BODY);
  _svgStrokeEllipse(g, 218, 85, 36, 32, lineW);
  // Blush
  _svgFillEllipse(g, 202, 100, 7, 3.5, SVG_C_BLUSH);

  // Upper beak + nostril
  g.fillStyle = SVG_C_BEAK;
  g.fill(SVG_PATH_BEAK_TOP);
  _svgStrokedPath(g, SVG_PATH_BEAK_TOP, lineW);
  _svgFillCircle(g, 278, 82, 1.6, SVG_C_LINE);

  // Lower beak opens when quacking; reveals mouth patch
  const beakOpen = state.quack ? 6 : 0;
  g.save();
  g.translate(0, beakOpen);
  g.fillStyle = SVG_C_BEAK;
  g.fill(SVG_PATH_BEAK_BOT);
  _svgStrokedPath(g, SVG_PATH_BEAK_BOT, lineW);
  if (state.quack) {
    g.save();
    g.translate(0, -beakOpen);
    // Mouth oval spanning (250..288, 88..96)
    g.fillStyle = SVG_C_MOUTH;
    g.beginPath();
    g.ellipse((250 + 288) / 2, (88 + 96) / 2, (288 - 250) / 2, (96 - 88) / 2, 0, 0, Math.PI * 2);
    g.fill();
    g.restore();
  }
  g.restore();

  // Eyes (left small, right bigger with highlight)
  _svgDrawEye(g, 202, 75, 4.5, 2.2, false, sadness);
  _svgDrawEye(g, 222, 73, 7.5, 3.5, true,  sadness);

  g.restore(); // end head/neck bob

  // Front leg (in front of body)
  g.save();
  g.translate(0, -frontLift * 10);
  _svgDrawLeg(g, 168, 322, 172, 365, SVG_PATH_FOOT_FRONT, lineW);
  g.restore();
}

function drawGoose() {
  if (state.gooseHidden) return;
  const c    = gooseCenter();
  const size = gooseBaseSize();
  ctx.save();
  ctx.globalAlpha = state.gooseAlpha;
  ctx.translate(c.x, c.y + state.gooseAnimTranslateY);
  ctx.rotate(state.gooseAnimRotation);
  const sx = state.gooseBaseScale * state.gooseAnimScaleX;
  const sy = state.gooseBaseScale * state.gooseAnimScaleY;
  ctx.scale(sx, sy);
  const drawW = size, drawH = size;

  // Sadness: desaturate and dim via CSS filter
  if (state.sad) {
    ctx.filter = 'saturate(0.5) brightness(0.85)';
  }

  if (state.gooseStyle === 1) {
    // SVG mode: fit 300x400 viewBox so the rendered goose looks the same
    // size as the PNG. The PNG fills ~full width of `size`, while the SVG
    // body only occupies x≈40..293 (≈253/300 of the viewBox width), so we
    // upscale by ~1.18x to roughly match. vbH (400) dominates after scaling.
    const vbW = 300, vbH = 400;
    const svgScale = (size / vbH) * 1.30;
    ctx.save();
    ctx.scale(svgScale, svgScale);
    ctx.translate(-vbW / 2, -vbH / 2);
    drawGooseSvg(ctx);
    ctx.restore();
  } else {
    const img = state.quack ? gooseBodyQuack : gooseBody;
    if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
    } else if (gooseImg && gooseImg.complete && gooseImg.naturalWidth) {
      ctx.drawImage(gooseImg, -drawW / 2, -drawH / 2, drawW, drawH);
    } else {
      // Fallback placeholder while images are loading
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, drawW * 0.4, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.filter = 'none';
  ctx.restore();
}

// =============================================================
// Goose squash animation — keyframes matching Android animateGoose()
// =============================================================
function animateGoose() {
  // Base scale is controlled by gooseBaseScale; we animate multipliers only.
  const wobble = (Math.random() < 0.5 ? -1 : 1) * (6 + Math.random() * 4) * Math.PI / 180;
  // Three phases: compress (70ms), stretch-up (140ms), return with overshoot (180ms)
  state.animQueue = {
    phase: 0, t: 0,
    phases: [
      { dur: 0.07, from: { sx:1,    sy:1,    ty:0,   rot:0            }, to: { sx:0.86, sy:0.92, ty:0,   rot: wobble         } },
      { dur: 0.14, from: { sx:0.86, sy:0.92, ty:0,   rot: wobble      }, to: { sx:1.08, sy:0.95, ty:-45, rot: -wobble * 0.6  } },
      { dur: 0.18, from: { sx:1.08, sy:0.95, ty:-45, rot:-wobble*0.6  }, to: { sx:1,    sy:1,    ty:0,   rot: 0              }, overshoot: true },
    ]
  };
}

function updateGooseAnim(dt) {
  const aq = state.animQueue;
  if (!aq) {
    state.gooseAnimScaleX     = 1;
    state.gooseAnimScaleY     = 1;
    state.gooseAnimTranslateY = 0;
    state.gooseAnimRotation   = 0;
    return;
  }
  aq.t += dt;
  const ph = aq.phases[aq.phase];
  let p    = Math.min(1, aq.t / ph.dur);
  let ep;
  if (ph.overshoot) {
    // OvershootInterpolator: (t-1)^2 * ((tension+1)(t-1) + tension) + 1 ; tension = 2.5
    const s = 2.5;
    const tt = p - 1;
    ep = tt * tt * ((s + 1) * tt + s) + 1;
  } else {
    // Accelerate-decelerate via cosine
    ep = (Math.cos((1 - p) * Math.PI) + 1) / 2;
  }
  const fromV = ph.from, toV = ph.to;
  state.gooseAnimScaleX     = fromV.sx  + (toV.sx  - fromV.sx)  * ep;
  state.gooseAnimScaleY     = fromV.sy  + (toV.sy  - fromV.sy)  * ep;
  state.gooseAnimTranslateY = fromV.ty  + (toV.ty  - fromV.ty)  * ep;
  state.gooseAnimRotation   = fromV.rot + (toV.rot - fromV.rot) * ep;
  if (p >= 1) {
    aq.phase++;
    aq.t = 0;
    if (aq.phase >= aq.phases.length) state.animQueue = null;
  }
}

// =============================================================
// Respawn pop-in after explosion
// =============================================================
function startRespawn() {
  state.respawnT     = 0;
  state.gooseHidden  = false;
}
function updateRespawn(dt) {
  if (state.respawnT >= 1) return;
  state.respawnT = Math.min(1, state.respawnT + dt / 0.32);
  const p = state.respawnT;
  // Overshoot scale pop-in
  const s  = 2.2;
  const tt = p - 1;
  const ep = tt * tt * ((s + 1) * tt + s) + 1;
  const scale = 0.2 + (1 - 0.2) * ep;
  state.gooseAnimScaleX = scale;
  state.gooseAnimScaleY = scale;
  state.gooseAlpha      = Math.min(1, p * 2);
  if (p >= 1) {
    state.gooseAlpha  = 1;
    state.exploding   = false;
  }
}

const motivEl = document.getElementById('motivation');

function setMotivation(text, tier) {
  const colors = ['#FFEA8A', '#FFD23E', '#FF8A3E', '#FF3E3E'];
  const sizes  = [18, 20, 24, 28];
  motivEl.textContent = text;
  motivEl.style.color    = colors[tier];
  motivEl.style.fontSize = sizes[tier] + 'px';
  motivEl.classList.add('show');
  motivEl.classList.toggle('pulse', tier === 3);
}
function hideMotivation() {
  motivEl.classList.remove('show', 'pulse');
}
function updateMotivation() {
  const ratio = state.tempo / TEMPO_EXPLODE;
  let tier, pool;
  if (ratio < 0.25) {
    hideMotivation();
    state.lastMotivationTier = -1;
    return;
  } else if (ratio < 0.5)  { tier = 0; pool = t('motiv_start'); }
  else if (ratio < 0.75)   { tier = 1; pool = t('motiv_mid');   }
  else if (ratio < 0.92)   { tier = 2; pool = t('motiv_high');  }
  else                     { tier = 3; pool = t('motiv_boom');   }

  if (tier === state.lastMotivationTier) return;
  state.lastMotivationTier = tier;
  let idx = Math.floor(Math.random() * pool.length);
  if (idx === state.lastMotivationIdx && pool.length > 1) idx = (idx + 1) % pool.length;
  state.lastMotivationIdx = idx;
  setMotivation(pool[idx], tier);
}

// =============================================================
// Flying +1 point animation — travels from tap position to score chip
// =============================================================
const stage = document.getElementById('stage');

function flyPointToScore(startX, startY) {
  const plus = document.createElement('div');
  plus.className = 'fly-plus';
  plus.innerHTML = `<svg viewBox="0 0 34 34" width="34" height="34" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="30" height="30" rx="6" fill="#FFD23E" stroke="#fff" stroke-width="2"/>
    <text x="17" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#2a0f6b">+1</text>
  </svg>`;
  stage.appendChild(plus);

  const stageRect = stage.getBoundingClientRect();
  const scoreRect = scoreEl.getBoundingClientRect();
  const x0 = startX - 17;
  const y0 = startY - 17;
  const x1 = (scoreRect.left - stageRect.left) + scoreRect.width  / 2 - 17;
  const y1 = (scoreRect.top  - stageRect.top)  + scoreRect.height / 2 - 17;
  const ctrlX = (x0 + x1) / 2 + (Math.random() - 0.5) * 140;
  const ctrlY = Math.min(y0, y1) - 200;
  const spin  = (Math.random() < 0.5 ? -1 : 1) * (540 + Math.random() * 360);

  const dur    = 560;
  const startT = performance.now();
  let lastSparkT = -1;
  function step(now) {
    const t = Math.min(1, (now - startT) / dur);
    // Slightly accelerating ease
    const eased = Math.pow(t, 1.3);
    const om    = 1 - eased;
    const bx    = om*om * x0 + 2*om*eased*ctrlX + eased*eased * x1;
    const by    = om*om * y0 + 2*om*eased*ctrlY + eased*eased * y1;
    const scale = 0.4 + 1.1 * eased - 0.45 * eased * eased;
    plus.style.transform = `translate(${bx}px,${by}px) scale(${scale}) rotate(${spin * eased}deg)`;
    plus.style.opacity   = Math.min(1, t * 5);
    // Trailing sparks only on desktop — on mobile they compound with the
    // burst at the end and tank the frame rate.
    if (!IS_TOUCH_DEVICE && eased - lastSparkT > 0.05) {
      spawnSpark(bx + 17, by + 17);
      lastSparkT = eased;
    }
    if (t < 1) requestAnimationFrame(step);
    else {
      spawnBurst(x1 + 17, y1 + 17);
      plus.remove();
      onPointArrived();
    }
  }
  requestAnimationFrame(step);
}

function flyBonusCube(startX, startY, value) {
  const plus = document.createElement('div');
  plus.className = 'fly-plus';
  plus.style.width = '40px'; plus.style.height = '40px';
  plus.innerHTML = `<svg viewBox="0 0 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="36" height="36" rx="7" fill="#FF3E7F" stroke="#fff" stroke-width="2.5"/>
    <text x="20" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#fff">+${value}</text>
  </svg>`;
  stage.appendChild(plus);

  const stageRect = stage.getBoundingClientRect();
  const scoreRect = scoreEl.getBoundingClientRect();
  const x0 = startX - 20;
  const y0 = startY - 20;
  const x1 = (scoreRect.left - stageRect.left) + scoreRect.width  / 2 - 20;
  const y1 = (scoreRect.top  - stageRect.top)  + scoreRect.height / 2 - 20;
  const ctrlX = (x0 + x1) / 2 + (Math.random() - 0.5) * 220;
  const ctrlY = Math.min(y0, y1) - 260;
  const spin  = (Math.random() < 0.5 ? -1 : 1) * (720 + Math.random() * 360);
  const dur   = 700 + Math.random() * 300;
  const startT = performance.now();
  let lastSparkT = -1;
  function step(now) {
    const t     = Math.min(1, (now - startT) / dur);
    const eased = Math.pow(t, 1.3);
    const om    = 1 - eased;
    const bx    = om*om * x0 + 2*om*eased*ctrlX + eased*eased * x1;
    const by    = om*om * y0 + 2*om*eased*ctrlY + eased*eased * y1;
    const scale = 0.4 + 1.1 * eased - 0.45 * eased * eased;
    plus.style.transform = `translate(${bx}px,${by}px) scale(${scale}) rotate(${spin * eased}deg)`;
    plus.style.opacity   = Math.min(1, t * 5);
    if (!IS_TOUCH_DEVICE && eased - lastSparkT > 0.05) {
      spawnSpark(bx + 20, by + 20);
      lastSparkT = eased;
    }
    if (t < 1) requestAnimationFrame(step);
    else {
      spawnBurst(x1 + 20, y1 + 20);
      plus.remove();
      for (let k = 0; k < value; k++) onPointArrived();
    }
  }
  requestAnimationFrame(step);
}

function spawnBonusPoints(cx, cy, count) {
  const visual    = Math.min(20, count);
  const perCube   = Math.floor(count / visual);
  const remainder = count - perCube * visual;
  for (let i = 0; i < visual; i++) {
    const delay = i * 40;
    const jx    = (Math.random() - 0.5) * 120;
    const jy    = (Math.random() - 0.5) * 80;
    const value = perCube + (i < remainder ? 1 : 0);
    setTimeout(() => flyBonusCube(cx + jx, cy + jy, value), delay);
  }
}

// =============================================================
// Anti-cheat v5.1 — five detection signatures
// =============================================================
function registerTapForCheatCheck(now, x, y) {
  if (state.lastTapTime > 0) {
    const interval = now - state.lastTapTime;
    if (interval >= MULTITOUCH_WINDOW_MS && interval < 2000) {
      state.tapIntervals[state.tapIntervalIdx] = interval;
      state.tapXs[state.tapIntervalIdx]        = x;
      state.tapYs[state.tapIntervalIdx]        = y;
      state.tapIntervalIdx = (state.tapIntervalIdx + 1) % CHEAT_BUFFER_SIZE;
      if (state.tapIntervalCount < CHEAT_BUFFER_SIZE) state.tapIntervalCount++;
      state.lastTapTime = now;
    } else if (interval >= 2000) {
      // Long gap — reset the buffer
      state.tapIntervalCount = 0;
      state.tapIntervalIdx   = 0;
      state.lastTapTime      = now;
    }
    // else: multitouch — do not update lastTapTime
  } else {
    state.lastTapTime = now;
  }

  if (state.tapIntervalCount < CHEAT_BUFFER_SIZE) return false;

  let sum = 0, minI = Infinity, maxI = -Infinity;
  for (let i = 0; i < CHEAT_BUFFER_SIZE; i++) {
    const v = state.tapIntervals[i];
    sum += v;
    if (v < minI) minI = v;
    if (v > maxI) maxI = v;
  }
  const mean = sum / CHEAT_BUFFER_SIZE;
  let sq = 0;
  for (let i = 0; i < CHEAT_BUFFER_SIZE; i++) {
    const d = state.tapIntervals[i] - mean;
    sq += d * d;
  }
  const std = Math.sqrt(sq / CHEAT_BUFFER_SIZE);
  const cv  = (mean > 0) ? (std / mean) : 1.0;

  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  for (let i = 0; i < CHEAT_BUFFER_SIZE; i++) {
    const px = state.tapXs[i], py = state.tapYs[i];
    if (px < xMin) xMin = px; if (px > xMax) xMax = px;
    if (py < yMin) yMin = py; if (py > yMax) yMax = py;
  }
  const spatialSpread = Math.max(xMax - xMin, yMax - yMin);

  // Signature 1: very low coefficient of variation + fast mean interval
  if (cv < 0.10 && mean < 170.0) return true;
  // Signature 2: tiny spread in recent intervals + fast pace
  const spread = maxI - minI;
  if (spread <= 20 && mean < 200.0) return true;
  // Signature 3: last 5 taps — near-zero interval spread + fast pace
  let sum5 = 0, min5 = Infinity, max5 = -Infinity;
  let x5Min = Infinity, x5Max = -Infinity, y5Min = Infinity, y5Max = -Infinity;
  for (let k = 0; k < 5; k++) {
    const i = (state.tapIntervalIdx - 1 - k + CHEAT_BUFFER_SIZE) % CHEAT_BUFFER_SIZE;
    const v = state.tapIntervals[i];
    sum5 += v;
    if (v < min5) min5 = v;
    if (v > max5) max5 = v;
    const px = state.tapXs[i], py = state.tapYs[i];
    if (px < x5Min) x5Min = px; if (px > x5Max) x5Max = px;
    if (py < y5Min) y5Min = py; if (py > y5Max) y5Max = py;
  }
  const mean5    = sum5 / 5.0;
  const spread5  = max5 - min5;
  const spatial5 = Math.max(x5Max - x5Min, y5Max - y5Min);
  if (spread5 <= 10 && mean5 < 220.0) return true;
  // Signature 4: all taps cluster in a tiny spatial area + fast pace
  if (spatialSpread < 50 && mean < 200.0) return true;
  // Signature 5: last 5 taps — tiny spatial cluster + fast pace
  if (spatial5 < 35 && mean5 < 230.0) return true;

  return false;
}

function triggerCheatPenalty() {
  const now = performance.now();
  state.cheatPenaltyUntil = now + 3000;
  state.tempo             = 0;
  state.tapIntervalCount  = 0;
  state.tapIntervalIdx    = 0;
  applyTempoScale();
  applyHeat();
  hideMotivation();
  state.lastMotivationTier = -1;
  state.pendingScore = Math.max(0, state.pendingScore - 50);
  state.score        = Math.min(state.score, state.pendingScore);
  updateScoreText();
  persist();
  if (now - state.lastCheatWarnAt > 2000) {
    state.lastCheatWarnAt = now;
    showCheatWarning();
    vibrate([40, 80, 40, 80, 40]);
  }
}

// =============================================================
// Main tap handler
// =============================================================
// Anti-cheat can be toggled off without removing the detection code.
// Flip this to `true` to re-enable v5.1 detection + penalty.
const ANTICHEAT_ENABLED = false;

function onGooseTap(x, y) {
  if (state.exploding) return;
  const now = performance.now();
  if (ANTICHEAT_ENABLED) {
    if (now < state.cheatPenaltyUntil) return;
    if (registerTapForCheatCheck(now, x, y)) {
      triggerCheatPenalty();
      return;
    }
  }
  state.pendingScore++;
  AudioPool.play();
  animateGoose();

  // Switch to open-beak frame briefly
  state.quackingRequests++;
  state.quack = true;
  setTimeout(() => {
    state.quackingRequests--;
    if (state.quackingRequests <= 0) {
      state.quackingRequests = 0;
      state.quack = false;
    }
  }, 220);

  spawnTapFx(x, y);
  vibrate(20);
  flyPointToScore(x, y);

  // Reset sadness timer
  state.sad = false;
  if (state.sadnessTimeout) clearTimeout(state.sadnessTimeout);
  state.sadnessTimeout = setTimeout(() => { state.sad = true; }, SADNESS_DELAY_MS);

  // Advance tempo — gain scales with tap speed.
  const dt = state.lastTapAt ? (now - state.lastTapAt) : 9999;
  state.lastTapAt = now;
  let gain;
  if      (dt <= TEMPO_FAST_MS) gain = TEMPO_GAIN_FAST;
  else if (dt <= TEMPO_MID_MS)  gain = TEMPO_GAIN_MID;
  else if (dt <= TEMPO_SLOW_MS) gain = TEMPO_GAIN_SLOW;
  else                          gain = 0;
  state.tempo += gain;
  if (state.tempo >= TEMPO_EXPLODE) {
    triggerExplode();
  } else {
    applyTempoScale();
    applyHeat();
    updateMotivation();
  }
}

function onPointArrived() {
  state.score++;
  updateScoreText();
  pulseEl(scoreEl, 1.18, 260);

  // Praise banner every 100 points
  if (state.score > 0 && state.score % 100 === 0 && state.score !== state.lastMilestoneShown) {
    state.lastMilestoneShown = state.score;
    showPraise();
    vibrate([0, 80, 60, 80, 60, 150]);
  }
  persist();
}

function triggerExplode() {
  if (state.exploding) return;
  state.exploding = true;
  state.animQueue = null;

  state.explodeCount++;
  updateExplodeText();
  pulseEl(explodeEl, 1.4, 420);
  hideMotivation();
  state.lastMotivationTier = -1;
  state.heat  = 0;
  state.tempo = 0;

  const c = gooseCenter();
  spawnExplode(c.x, c.y);

  state.pendingScore += EXPLODE_BONUS;
  persist();
  spawnBonusPoints(c.x, c.y, EXPLODE_BONUS);
  showBonusBanner(EXPLODE_BONUS);

  vibrate([0, 90, 30, 60, 25, 140, 35, 70, 30, 180, 40, 90, 30, 120, 35, 60, 40, 80]);

  flashScreen();

  // Hide goose; respawn after particle peak
  state.gooseHidden = true;
  setTimeout(() => {
    const cc = gooseCenter();
    spawnTapFx(cc.x, cc.y);
    startRespawn();
  }, 420);
}

// =============================================================
// Touch / mouse input — broad hit area (full canvas minus HUD)
// =============================================================
function inputToLocal(clientX, clientY) {
  const r = cv.getBoundingClientRect();
  return { x: clientX - r.left, y: clientY - r.top };
}

cv.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const p = inputToLocal(t.clientX, t.clientY);
    onGooseTap(p.x, p.y);
  }
}, { passive: false });

cv.addEventListener('mousedown', (e) => {
  // Skip if the browser also fires touch events for this interaction
  if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
  const p = inputToLocal(e.clientX, e.clientY);
  onGooseTap(p.x, p.y);
});

// Suppress context menu and browser gestures
cv.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('gesturestart', (e) => e.preventDefault());

// =============================================================
// Main render loop
// =============================================================
let lastFrame = performance.now();
function frame(now) {
  const dtRaw = (now - lastFrame) / 1000;
  lastFrame   = now;
  const dt    = Math.min(0.05, dtRaw); // cap delta to avoid spiral-of-death

  // Tempo decays between taps so only sustained fast clicking fills the bar.
  if (!state.exploding && state.tempo > 0) {
    state.tempo = Math.max(0, state.tempo - TEMPO_DECAY_PER_SEC * dt);
    applyTempoScale();
    applyHeat();
    updateMotivation();
  }

  // Clear canvas
  ctx.clearRect(0, 0, W, H);

  drawBackground(dt);

  // Update and cull particles
  for (let i = sparks.length - 1; i >= 0; i--) {
    sparks[i].update(dt);
    if (sparks[i].t > sparks[i].life) sparks.splice(i, 1);
  }
  for (let i = feathers.length - 1; i >= 0; i--) {
    feathers[i].update(dt);
    if (feathers[i].t > feathers[i].life) feathers.splice(i, 1);
  }
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].t += dt;
    if (ripples[i].t > ripples[i].life) ripples.splice(i, 1);
  }

  // Draw sparks beneath the goose
  for (const s of sparks) {
    const p      = s.t / s.life;
    const alpha  = Math.max(0, 1 - p);
    const glowA  = alpha * 0.35;
    const r      = s.size * (1.8 + p * 0.8);
    ctx.globalAlpha = glowA;
    ctx.fillStyle   = s.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
    const coreA = Math.min(1, alpha + 30 / 255);
    ctx.globalAlpha = coreA;
    const sz = s.size * (1 - p * 0.4);
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation + p * 3.8);
    ctx.fillRect(-sz, -sz, sz * 2, sz * 2);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Smoothly ease sadness toward its target (matches Android ±0.06 lerp).
  {
    const target = state.sad ? 1 : 0;
    state.sadness += (target - state.sadness) * 0.06;
    if (Math.abs(target - state.sadness) < 0.003) state.sadness = target;
  }

  // Draw goose with current transform
  updateGooseAnim(dt);
  updateRespawn(dt);
  drawGoose();

  // Draw ripple rings on top of goose
  for (const r of ripples) {
    const p      = r.t / r.life;
    const radius = r.startR + (r.endR - r.startR) * (1 - Math.pow(1 - p, 3));
    const alpha  = 180 * (1 - p) / 255;
    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, alpha)})`;
    ctx.lineWidth   = 4 + 2 * (1 - p);
    ctx.beginPath();
    ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Draw feathers on top of everything
  for (const f of feathers) {
    const p     = f.t / f.life;
    const alpha = Math.max(0, 1 - p * 1.1);
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation);
    ctx.fillStyle   = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.w / 2, f.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(60,70,80,${alpha * 0.6})`;
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// =============================================================
// Init
// =============================================================
applyTempoScale();
applyHeat();
persist();

// PWA: register service worker for installability and offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

</script>
