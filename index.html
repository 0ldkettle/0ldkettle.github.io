<title>Goose Clicker</title>
<style>
  :root {
    --bg-top: #2a0f6b;
    --bg-bot: #120426;
    --neon-cyan: #2EE6FF;
    --neon-pink: #FF3E7F;
    --neon-yellow: #FFD23E;
    --ink: #fff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%;
    /* iOS PWA fill fix: --app-height is set from JS to window.innerHeight,
       which in iOS standalone returns the true screen height (including
       the home-indicator strip). Fallbacks for layout engines that don't
       run the JS yet. */
    height: 100vh;
    height: -webkit-fill-available;
    height: 100dvh;
    height: var(--app-height, 100dvh);
    /* Solid dark-purple so any safe-area around the stage tints with the
       game palette instead of pure black. */
    background: #080217;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    /* `none` (not `manipulation`) — Android Chrome otherwise introduces a
       ~300ms delay and drops rapid successive taps while waiting to decide
       between tap / double-tap-zoom / pan. iOS already treats this as a
       fast-tap surface. */
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif;
    color: var(--ink);
  }
  #stage {
    position: fixed;
    inset: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 560px;
    /* Pin to the real viewport bottom; --app-height tracks window.innerHeight. */
    height: 100vh;
    height: -webkit-fill-available;
    height: 100dvh;
    height: var(--app-height, 100dvh);
    overflow: hidden;
    background: linear-gradient(180deg, #3a1685 0%, #1a0a3c 55%, #080217 100%);
  }
  canvas {
    position: absolute; left: 0; top: 0;
    width: 100%; height: 100%;
    display: block;
    /* Disable ALL browser-owned touch gestures on the game surface so every
       tap fires instantly on Android Chrome (no double-tap-zoom wait). */
    touch-action: none;
  }
  .hud {
    position: absolute;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
  }
  .hud > * { pointer-events: auto; }
  .hud-top {
    top: 0;
    /* Leave room on the right for the vertical control stack. */
    padding: max(14px, env(safe-area-inset-top)) 64px 10px 16px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .chip {
    font-weight: 800;
    font-size: 13px;
    padding: 7px 11px;
    border-radius: 14px;
    background: rgba(10,6,30,.78);
    border: 1.5px solid rgba(255,255,255,.18);
    white-space: nowrap;
    transition: transform .12s ease-out;
    will-change: transform;
  }
  /* Heavy backdrop blur only on capable desktop browsers — iOS Safari
     hitches hard when repainting blurred HUD on every frame. */
  @media (hover: hover) and (pointer: fine) {
    .chip {
      background: rgba(10,6,30,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
  }
  #score { color: var(--neon-yellow); text-align: left; text-shadow: 0 0 10px rgba(255,210,62,.6); }
  #explodeCount { color: var(--neon-pink); text-align: right; text-shadow: 0 0 10px rgba(255,62,127,.55); }

  #motivation {
    position: absolute;
    left: 16px; right: 16px;
    bottom: calc(24px + env(safe-area-inset-bottom));
    text-align: center;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-shadow: 0 2px 0 rgba(0,0,0,.55), 0 0 16px currentColor;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity .22s, transform .18s cubic-bezier(.17,.89,.32,1.49);
    pointer-events: none;
    z-index: 12;
  }
  #motivation.show { opacity: 1; transform: scale(1); }
  #motivation.pulse { animation: pulse 480ms ease-in-out infinite alternate; }
  @keyframes pulse {
    from { transform: scale(1); filter: drop-shadow(0 0 4px currentColor); }
    to { transform: scale(1.08); filter: drop-shadow(0 0 18px currentColor); }
  }

  .banner {
    position: absolute;
    left: 50%;
    top: 25%;
    transform: translate(-50%, 0) scale(0.6);
    padding: 14px 22px;
    border-radius: 999px;
    background: rgba(46,57,66,.88);
    border: 2.5px solid #fff;
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    opacity: 0;
    z-index: 20;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    white-space: nowrap;
  }
  .bonus-banner {
    font-size: 42px;
    color: var(--neon-yellow);
    background: transparent;
    border: none;
    text-shadow: 0 0 18px #FF3E7F, 0 4px 0 rgba(0,0,0,.4);
    box-shadow: none;
  }
  .cheat-banner {
    background: rgba(139,0,0,.93);
    border-color: #fff;
    white-space: pre-line;
    text-align: center;
    font-size: 18px;
    top: 38%;
    text-shadow: 0 2px 10px rgba(0,0,0,.8);
  }

  .flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    z-index: 30;
    pointer-events: none;
  }

  #credits {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.7);
    z-index: 100;
    padding: 20px;
  }

  #credits .dialog {
    max-width: 360px;
    background: #1a0a3c;
    border: 2px solid rgba(255,255,255,.25);
    border-radius: 18px;
    padding: 22px 22px 14px 22px;
    color: #fff;
    font-size: 14px;
    line-height: 1.45;
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
  }
  #credits h3 { margin: 0 0 12px 0; font-size: 18px; }
  #credits pre {
    margin: 0;
    font: inherit;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #credits button {
    margin-top: 14px;
    float: right;
    background: var(--neon-cyan);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
  }

  /* Vertical stack of HUD control buttons, anchored top-right. */
  #controls {
    position: absolute;
    top: max(10px, env(safe-area-inset-top));
    right: 10px;
    z-index: 11;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
    pointer-events: none;
  }
  #langBtn, #styleBtn, #muteBtn, #shakeBtn {
    position: relative;
    box-sizing: border-box;
    width: 44px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,6,30,.85);
    border: 1.5px solid rgba(255,255,255,.22);
    border-radius: 10px;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    padding: 0;
    cursor: pointer;
    letter-spacing: 0.5px;
    line-height: 1;
    transition: background .15s, transform .1s;
    pointer-events: auto;
    -webkit-touch-callout: none;
  }
  #muteBtn { font-size: 15px; }
  #shakeBtn { font-size: 16px; }

  /* Long-press feedback: fill ring grows during hold, flashes on fire. */
  #langBtn::before, #styleBtn::before, #muteBtn::before, #shakeBtn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 12px;
    border: 2px solid var(--neon-cyan);
    opacity: 0;
    transform: scale(0.92);
    transition: opacity .12s ease-out, transform .55s ease-out;
    pointer-events: none;
  }
  #langBtn.holding::before, #styleBtn.holding::before, #muteBtn.holding::before, #shakeBtn.holding::before {
    opacity: 0.9;
    transform: scale(1.08);
  }
  #langBtn.fired, #styleBtn.fired, #muteBtn.fired, #shakeBtn.fired {
    background: var(--neon-cyan);
    color: #000;
  }

  /* Build hash — small, low-contrast, unobtrusive in the bottom-left */
  #buildHash {
    position: absolute;
    bottom: max(10px, env(safe-area-inset-bottom));
    left: 12px;
    z-index: 11;
    color: rgba(255,255,255,.22);
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    pointer-events: none;
    user-select: none;
  }
  /* Live tap-rate meter — shows current taps per second. */
  #tapRate {
    position: absolute;
    bottom: max(10px, env(safe-area-inset-bottom));
    right: 12px;
    z-index: 11;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px rgba(46,230,255,.6);
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 4px 6px;
    touch-action: none;
    -webkit-touch-callout: none;
    user-select: none;

    color: var(--neon-pink);
    text-shadow: 0 0 10px rgba(255,62,127,.75);
  }

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

    position: absolute;
    width: 34px; height: 34px;
    pointer-events: none;
    z-index: 15;
    will-change: transform, opacity;

  /* ---------- Tablet / iPad layout ----------
     On large screens (≥700px) the stage fills the entire viewport — no
     centered column, no letterboxing. HUD chrome and controls are scaled
     up so they remain comfortable for a finger on an 11-13" slab. */
  @media (min-width: 700px) {
    #stage { max-width: none; left: 0; transform: none; }
    .hud-top { padding: max(20px, env(safe-area-inset-top)) 92px 14px 24px; gap: 10px; }
    .chip { font-size: 18px; padding: 10px 16px; border-radius: 18px; }
    #motivation { font-size: 22px; }
    .banner { font-size: 28px; padding: 18px 30px; }
    .bonus-banner { font-size: 56px; }
    .cheat-banner { font-size: 24px; }
    #controls { top: max(16px, env(safe-area-inset-top)); right: 18px; gap: 10px; }
    #langBtn, #styleBtn, #muteBtn, #shakeBtn { width: 60px; height: 42px; font-size: 16px; border-radius: 12px; }
    #muteBtn { font-size: 20px; }
    #shakeBtn { font-size: 20px; }
    #buildHash { font-size: 12px; left: 18px; }
    #tapRate { font-size: 16px; right: 18px; padding: 6px 10px; }
    .fly-plus { width: 44px; height: 44px; }
  }
</style>

'use strict';

// =============================================================
// iOS PWA viewport fill — sets --app-height to the true viewport height.
// 100vh/100dvh can under-report on iOS Safari standalone, leaving a black
// strip at the bottom. window.innerHeight is the reliable source.
// =============================================================
(function setAppHeight() {
  // Track the largest height we've ever seen — iOS standalone can report
  // a shorter innerHeight in transient states (just after SW reload, during
  // the unlock animation). Keeping the max prevents a brief short value
  // from leaving a permanent black strip at the bottom.
  let maxH = 0;
  function apply() {
    let h = window.innerHeight;
    if (window.visualViewport && window.visualViewport.height > h) {
      h = window.visualViewport.height;
    }
    if (h > maxH) maxH = h;
    document.documentElement.style.setProperty('--app-height', maxH + 'px');
  }
  // Reset the max and re-sample many times over ~2.5s. Useful on unlock,
  // on orientation change, and after the PWA is resumed — iOS layout often
  // needs several frames to produce the final innerHeight.
  function reprobe() {
    maxH = 0;
    apply();
    [50, 150, 300, 600, 1200, 2500].forEach(d => setTimeout(apply, d));
  }
  apply();
  // Initial settle retries.
  [50, 150, 300, 600, 1200, 2500].forEach(d => setTimeout(apply, d));
  window.addEventListener('resize', apply);
  window.addEventListener('orientationchange', reprobe);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', apply);
  }
  // pageshow fires when returning from bfcache or when the PWA is resumed.
  window.addEventListener('pageshow', reprobe);
  // focus also fires after unlock — some iOS versions skip pageshow but hit focus.
  window.addEventListener('focus', reprobe);
  // When the tab becomes visible again (e.g. after unlock), re-probe fully.
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) reprobe();
  });
})();

// =============================================================
// Language management — persisted to localStorage via Store
// =============================================================
// We read lang preference after Store is defined below.
let currentLang = 'en';

/** Returns the localized string for the given key in the current language. */
function t(key) {
  const locale = I18N[currentLang] || I18N.en;
  return locale[key] !== undefined ? locale[key] : (I18N.en[key] || key);
}

// Locale tag passed to Intl.NumberFormat. EN -> en-US ("1,234,567"),
// RU -> ru-RU ("1\u00a0234\u00a0567").
function localeTag() {
  return currentLang === 'ru' ? 'ru-RU' : 'en-US';
}

// Cached formatter, rebuilt whenever the language changes (see setLang).
let _numFmt = null;
function fmtNum(n) {
  if (typeof n !== 'number' || !isFinite(n)) n = Number(n) || 0;
  try {
    if (!_numFmt) _numFmt = new Intl.NumberFormat(localeTag());
    return _numFmt.format(n);
  } catch {
    // Fallback for ancient runtimes: manual thousand separator.
    const sep = currentLang === 'ru' ? '\u00a0' : ',';
    const sign = n < 0 ? '-' : '';
    return sign + Math.abs(Math.trunc(n)).toString()
      .replace(/\B(?=(\d{3})+(?!\d))/g, sep);
  }
}
function _resetNumFmt() { _numFmt = null; }

// =============================================================
// Gameplay mechanics constants
// =============================================================
const TEMPO_PER_TAP  = 0.0476;
const TEMPO_EXPLODE  = 1.0;
const MIN_SCALE      = 0.30;
const EXPLODE_BONUS  = 10000;

// Tempo model (v3 — three-zone):
// We count taps over a sliding 1-second window and compute tapsPerSec.
// Three zones:
//   • tps <  TEMPO_DECAY_BELOW      → tempo drops at TEMPO_DECAY_PER_SEC
//   • tps in [DECAY_BELOW .. GROW_AT) → tempo holds steady (dead zone)
//   • tps >= TEMPO_GROW_AT           → tempo grows at TEMPO_GROW_PER_SEC
// Multiple fingers still work: only the total rate in the 1s window
// matters, not how you reach it.
//
// Tuning: at 28+ tps the bar fills in ~9.1s (≈255 taps minimum);
// from full the bar drains to 0 in 10s if you stop tapping.
const TEMPO_DECAY_BELOW   = 22;   // below this, bar drops
const TEMPO_GROW_AT       = 28;   // at/above this, bar grows
const TEMPO_GROW_PER_SEC  = 0.11; // ~9.1 s from 0 → explode at sustained 28+ tps
const TEMPO_DECAY_PER_SEC = 0.1;  // 10 s from full → 0 if tps < 22
const TEMPO_RATE_WINDOW_MS = 1000;
const SADNESS_DELAY_MS = 5000;

// Anti-cheat buffer settings
const CHEAT_BUFFER_SIZE    = 12;
const MULTITOUCH_WINDOW_MS = 80;

// =============================================================

// =============================================================
// Persistence layer — uses localStorage when available,
// falls back to an in-memory map inside sandboxed iframes
// where storage APIs are blocked.
// =============================================================
const Store = (() => {
  const KEY = 'local' + 'Storage'; // split to avoid over-eager static analysis
  let ls = null;
  try {
    ls = window[KEY];
    ls.setItem('__goose_probe', '1');
    ls.removeItem('__goose_probe');
  } catch(_) { ls = null; }
  const mem = Object.create(null);
  return {
    get(k)    { try { return ls ? ls.getItem(k) : (mem[k] ?? null); } catch(_) { return mem[k] ?? null; } },
    set(k, v) { try { if (ls) ls.setItem(k, v); else mem[k] = v; }  catch(_) { mem[k] = v; } },
  };
})();

// Restore language preference.
// Default: system language (Russian if the browser/OS locale starts with "ru",
// English otherwise). Once the user explicitly picks a language, we remember it.
{
  const saved = Store.get('lang');
  if (saved === 'ru' || saved === 'en') {
    currentLang = saved;
  } else {
    const navLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    currentLang = navLang.startsWith('ru') ? 'ru' : 'en';
  }
}

// Restore goose style preference (default: SVG)
{
  const gs = Store.get('goose_style');
  state.gooseStyle = (gs === '0') ? 0 : 1;
}

// Restore mute preference (default: sound on)
state.muted = Store.get('muted') === '1';

// Restore game score and explosion count
{
  const s = parseInt(Store.get('goose_score') || '0', 10);
  if (!isNaN(s)) { state.score = s; state.pendingScore = s; }
  const e = parseInt(Store.get('goose_explode_count') || '0', 10);
  if (!isNaN(e)) state.explodeCount = e;
}

function persist() {
  Store.set('goose_score', String(state.pendingScore));
  Store.set('goose_explode_count', String(state.explodeCount));
}

// =============================================================
// Canvas setup with device pixel ratio
// =============================================================
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;

// Coarse pointer = phones/tablets. iOS Safari hits a fill-rate wall when rendering
// hundreds of particles at 3x DPR, so we cap DPR lower and halve particle counts.
const IS_TOUCH_DEVICE = matchMedia('(hover: none) and (pointer: coarse)').matches;
// Safari detection — used for the audio backend choice only. Safari's Canvas
// pipeline is fine; the real perf issue was overlapping HTMLAudioElement.play() calls,
// which are handled via Web Audio API below.
const IS_SAFARI = /^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(navigator.userAgent);
const LITE_FX = IS_TOUCH_DEVICE;
const FX_SCALE = LITE_FX ? 0.5 : 1;             // particle-count multiplier
const DPR_CAP  = LITE_FX ? 2 : 2.5;
// Hard caps on simultaneous particles — prevents accumulation at high tap rates.
const MAX_SPARKS   = LITE_FX ? 120 : 240;
const MAX_FEATHERS = LITE_FX ?  60 : 120;
const MAX_RIPPLES  = LITE_FX ?  16 :  28;
const MAX_FLY_PLUS = LITE_FX ?   6 :  10;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, DPR_CAP);
  const stage = document.getElementById('stage');
  const r = stage.getBoundingClientRect();
  W = Math.round(r.width);
  H = Math.round(r.height);
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
// ResizeObserver catches --app-height changes on the stage that don't fire
// a window resize event (common on iOS PWA after JS sets --app-height).
if (window.ResizeObserver) {
  new ResizeObserver(() => resize()).observe(document.getElementById('stage'));
}
resize();

// =============================================================
// Audio — Web Audio API for lag-free overlapping quacks on Safari/Chrome/Firefox.
// HTMLAudioElement with rapid .play() calls stalls Safari's main thread badly;
// AudioBufferSourceNode lets us fire hundreds of overlapping sounds cheaply.
// Falls back to an HTMLAudioElement pool if Web Audio is unavailable.
// =============================================================
const AudioPool = (() => {
  const AC = window.AudioContext || window.webkitAudioContext;
  let actx = null;
  let buffer = null;     // honk (tap / wall-bump quack)
  let popBuffer = null;  // balloon-pop (explosion)
  let masterGain = null;

  // HTMLAudioElement fallback — created lazily ONLY if Web Audio fails.
  // Previously we eagerly primed 8 elements on the first user gesture,
  // which stalls Safari's main thread on the first tap / mute click.
  const POOL_SIZE = 8;
  let htmlPool = null;
  let htmlIdx = 0;
  function ensureHtmlPool() {
    if (htmlPool) return htmlPool;
    htmlPool = [];
    for (let i = 0; i < POOL_SIZE; i++) {
      const a = new Audio('assets/honk.ogg');
      a.preload = 'auto';
      a.volume  = 0.85;
      htmlPool.push(a);
    }
    return htmlPool;
  }

  // Smaller HTMLAudio fallback pool for the pop sound — explosions are
  // far less frequent than taps, so 3 elements are plenty.
  const POP_POOL_SIZE = 3;
  let popHtmlPool = null;
  let popHtmlIdx = 0;
  function ensurePopHtmlPool() {
    if (popHtmlPool) return popHtmlPool;
    popHtmlPool = [];
    for (let i = 0; i < POP_POOL_SIZE; i++) {
      const a = new Audio('assets/pop.ogg');
      a.preload = 'auto';
      a.volume  = 1.0;
      popHtmlPool.push(a);
    }
    return popHtmlPool;
  }

  // Load the quack and the pop into AudioBuffers up front.
  if (AC) {
    try {
      actx = new AC();
      masterGain = actx.createGain();
      masterGain.gain.value = 0.85;
      masterGain.connect(actx.destination);
      fetch('assets/honk.ogg')
        .then(r => r.arrayBuffer())
        .then(ab => new Promise((res, rej) => actx.decodeAudioData(ab, res, rej)))
        .then(buf => { buffer = buf; })
        .catch(() => { /* fall back to HTMLAudio */ });
      fetch('assets/pop.ogg')
        .then(r => r.arrayBuffer())
        .then(ab => new Promise((res, rej) => actx.decodeAudioData(ab, res, rej)))
        .then(buf => { popBuffer = buf; })
        .catch(() => { /* fall back to HTMLAudio */ });
    } catch(_) { actx = null; }
  }

  // Web Audio contexts start suspended until a user gesture on most browsers.
  // Just resume — do NOT prime HTML audio here (that stalls Safari).
  function resumeCtx() {
    if (actx && actx.state === 'suspended') {
      actx.resume().catch(() => {});
    }
  }
  window.addEventListener('touchstart', resumeCtx, { passive: true });
  window.addEventListener('mousedown',  resumeCtx);
  window.addEventListener('keydown',    resumeCtx);

  function playWebAudio() {
    if (!actx || !buffer) return false;
    try {
      const src = actx.createBufferSource();
      src.buffer = buffer;
      // Slight pitch variation for natural quack feel
      src.playbackRate.value = 0.97 + Math.random() * 0.06;
      src.connect(masterGain);
      src.start(0);
      return true;
    } catch(_) { return false; }
  }

  function playHtmlAudio() {
    const pool = ensureHtmlPool();
    const a = pool[htmlIdx];
    htmlIdx = (htmlIdx + 1) % POOL_SIZE;
    try {
      a.currentTime = 0;
      a.playbackRate = 0.97 + Math.random() * 0.06;
      a.play().catch(() => {});
    } catch(_) {}
  }

  function playPopWebAudio() {
    if (!actx || !popBuffer) return false;
    try {
      const src = actx.createBufferSource();
      src.buffer = popBuffer;
      // Mild pitch jitter so consecutive pops don't sound identical.
      src.playbackRate.value = 0.94 + Math.random() * 0.12;
      // Pop is a very short transient — push it well above masterGain so it
      // cuts through the quack/screen-flash. masterGain is 0.85, so a 4.0
      // boost lands around ~3.4 effective gain. Soft-clip via WaveShaper so
      // we don't blow the speakers if the user has volume cranked.
      const g = actx.createGain();
      g.gain.value = 4.0;
      const shaper = actx.createWaveShaper();
      // 257-sample tanh curve — transparent up to ~0.7, gentle saturation above.
      const N = 257;
      const curve = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        const x = (i / (N - 1)) * 2 - 1;
        curve[i] = Math.tanh(x * 1.6) / Math.tanh(1.6);
      }
      shaper.curve = curve;
      src.connect(g);
      g.connect(shaper);
      shaper.connect(masterGain);
      src.start(0);
      return true;
    } catch(_) { return false; }
  }

  function playPopHtmlAudio() {
    const pool = ensurePopHtmlPool();
    const a = pool[popHtmlIdx];
    popHtmlIdx = (popHtmlIdx + 1) % POP_POOL_SIZE;
    try {
      a.currentTime = 0;
      a.volume = 1.0;
      a.playbackRate = 0.94 + Math.random() * 0.12;
      a.play().catch(() => {});
    } catch(_) {}
  }

  return {
    play() {
      if (state.muted) return;
      if (!playWebAudio()) playHtmlAudio();
    },
    playPop() {
      if (state.muted) return;
      if (!playPopWebAudio()) playPopHtmlAudio();
    }
  };
})();

// =============================================================
// Vibration helper
// =============================================================
function vibrate(pattern) {
  if (!navigator.vibrate) return;
  try { navigator.vibrate(pattern); } catch(_) {}
}

// =============================================================
// Goose geometry helpers
// =============================================================
function gooseCenter() {
  // Goose centered horizontally, slightly above vertical center
  return { x: W / 2, y: H * 0.48 };
}
function gooseBaseSize() {
  return Math.min(W * 0.72, H * 0.42, 360);
}

// =============================================================
// Particle system — sparks, feathers, ripples
// =============================================================
const SPARK_COLORS = ['#2EE6FF', '#FF3E7F', '#FFD23E', '#B07CFF', '#8EFF3E', '#FF8A3E'];

const sparks   = [];
const feathers = [];
const ripples  = [];

class Spark {
  // mode: false = gentle drift (used by +1 fly trail), true = burst,
  //       'contained' = small tap-burst that stays near the tap point.
  constructor(x, y, color, burst) {
    this.x = x; this.y = y;
    this.color    = color;
    this.rotation = Math.random() * Math.PI * 2;
    this.t = 0;
    if (burst === 'contained') {
      const a  = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 70;
      this.vx   = Math.cos(a) * sp;
      this.vy   = Math.sin(a) * sp;
      this.size = 3 + Math.random() * 2;
      this.life = 0.35 + Math.random() * 0.15;
    } else if (burst) {
      const a  = Math.random() * Math.PI * 2;
      const sp = 180 + Math.random() * 240;
      this.vx   = Math.cos(a) * sp;
      this.vy   = Math.sin(a) * sp;
      this.size = 5 + Math.random() * 4;
      this.life = 0.55 + Math.random() * 0.25;
    } else {
      this.vx   = (Math.random() - 0.5) * 80;
      this.vy   = (Math.random() - 0.5) * 60 + 30;
      this.size = 4 + Math.random() * 3;
      this.life = 0.35 + Math.random() * 0.15;
    }
  }
  update(dt) {
    this.t  += dt;
    this.vy += 260 * dt * 0.4;
    this.vx *= Math.pow(0.96, dt * 60);
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    this.rotation += dt * 3.8;
  }
}

class Feather {
  constructor(x, y) {
    this.x = x; this.y = y;
    const a  = Math.random() * Math.PI * 2;
    // Tighter spread: feathers stay near the tap point and fade fast.
    const sp = 90 + Math.random() * 80;
    this.vx       = Math.cos(a) * sp;
    this.vy       = Math.sin(a) * sp - 40;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 12;
    this.w        = 10 + Math.random() * 6;
    this.h        = 16 + Math.random() * 8;
    this.life     = 0.45 + Math.random() * 0.2;
    this.t        = 0;
  }
  update(dt) {
    this.t  += dt;
    this.vx *= Math.pow(0.985, dt * 60);
    this.vy += 380 * dt;
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    this.rotation += this.rotSpeed * dt;
  }
}

class Ripple {
  // Smaller default ripple: starts tiny, expands only ~35px, fades fast.
  constructor(x, y, sR = 5, eR = 35, life = 0.32) {
    this.x = x; this.y = y;
    this.startR = sR; this.endR = eR;
    this.life = life; this.t = 0;
  }
}

// Helper: scale a particle count by FX_SCALE, never below 1.
const fx = (n) => Math.max(1, Math.round(n * FX_SCALE));

function spawnTapFx(x, y) {
  // Tap ripple — 1.5× the default size for a more visible tap feedback.
  ripples.push(new Ripple(x, y, 8, 52, 0.38));
  const n = fx(7 + Math.floor(Math.random() * 4));
  for (let i = 0; i < n; i++) feathers.push(new Feather(x, y));
}
function spawnSpark(x, y) {
  const c = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
  sparks.push(new Spark(x, y, c, false));
}
function spawnBurst(x, y) {
  // Small confined burst used when a '+1' arrives at the score chip
  // and after each tap effect. No more screen-sweeping arcs.
  const n = fx(8 + Math.floor(Math.random() * 4));
  for (let i = 0; i < n; i++) {
    sparks.push(new Spark(x, y, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], 'contained'));
  }
  // No ripple here — the score-chip burst should be sparks only.
}
function spawnExplode(x, y) {
  // Explosion ripples are bigger than tap ripples but still well contained.
  ripples.push(new Ripple(x, y, 10, 110, 0.55));
  ripples.push(new Ripple(x, y,  6,  75, 0.42));
  ripples.push(new Ripple(x, y,  3,  45, 0.30));
  const n = fx(70 + Math.floor(Math.random() * 30));
  for (let i = 0; i < n; i++) {
    sparks.push(new Spark(x, y, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], true));
  }
  const fc = fx(45 + Math.floor(Math.random() * 15));
  for (let i = 0; i < fc; i++) feathers.push(new Feather(x, y));

  // Secondary burst after short delay
  setTimeout(() => {
    ripples.push(new Ripple(x, y, 9, 90, 0.45));
    const n2 = fx(30 + Math.floor(Math.random() * 15));
    for (let i = 0; i < n2; i++) {
      const ox = x + (Math.random() - 0.5) * 120;
      const oy = y + (Math.random() - 0.5) * 120;
      sparks.push(new Spark(ox, oy, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], true));
    }
  }, 150);

  // Third poof
  setTimeout(() => {
    ripples.push(new Ripple(x, y, 6, 70, 0.38));
    const n3 = fx(20 + Math.floor(Math.random() * 10));
    for (let i = 0; i < n3; i++) {
      const ox = x + (Math.random() - 0.5) * 180;
      const oy = y + (Math.random() - 0.5) * 180;
      sparks.push(new Spark(ox, oy, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], true));
    }
  }, 320);
}

// =============================================================
// Scare background cubes away from a tap point (fish-startle effect)
// =============================================================
function scareCubes(x, y) {
  const cubes = state.bgCubes;
  if (!cubes) return;
  const RADIUS = 200;         // cubes within this many px react strongly
  const MAX_IMPULSE = 520;    // peak scare velocity (px/s) at x=0 distance
  for (const c of cubes) {
    let dx = c.x - x;
    let dy = c.y - y;
    let dist = Math.hypot(dx, dy);
    if (dist < 1) {
      // Pick a random direction if the cube is right on the tap point
      const a = Math.random() * Math.PI * 2;
      dx = Math.cos(a); dy = Math.sin(a); dist = 1;
    }
    // Linear falloff: full impulse at the tap, zero past RADIUS.
    const falloff = Math.max(0, 1 - dist / RADIUS);
    if (falloff <= 0) continue;
    const mag = MAX_IMPULSE * falloff;
    c.sx += (dx / dist) * mag;
    c.sy += (dy / dist) * mag;
    // Kick the short-lived spin boost for a visual twitch of surprise.
    c.spinBoost += (Math.random() * 2 - 1) * 3.0;
    // Mark the cube as 'player-startled' for ~1.5s. If it lands on the
    // bottom spike row while this flag is active, it pops for +100.
    c.scaredUntil = (state.bgCubesT || 0) + 1.5;
  }
}

// Bonus awarded when a startled cube lands on the bottom spikes.
const CUBE_POP_BONUS = 100;

// Cube birth animation duration (seconds). During this window the cube
// scales in from 0 -> 1 with ease-out, spins extra, glows brightly and
// a multi-stage ripple+sparks burst plays at its origin.
const CUBE_BIRTH_DUR = 0.7;

// Spawn a fresh cube at a random on-screen position with a small
// pop-in effect (ripple + sparks + scale-in).
function spawnReplacementCube() {
  if (!state.bgCubes) return;
  const ang   = Math.random() * Math.PI * 2;
  const speed = 20 + Math.random() * 60;
  const size  = 18 + Math.random() * 16;
  const half  = size / 2;
  // Pick a random position somewhere inside the visible canvas (with a
  // small margin so the cube isn't half off-screen at birth).
  const x = half + 6 + Math.random() * Math.max(1, W - size - 12);
  const y = half + 6 + Math.random() * Math.max(1, H - size - 12);

  state.bgCubes.push({
    x, y,
    vx: Math.cos(ang) * speed,
    vy: Math.sin(ang) * speed,
    sx: 0, sy: 0,
    size,
    rot: Math.random() * Math.PI * 2,
    baseSpin:  (Math.random() < 0.5 ? -1 : 1) * (0.4 + Math.random() * 0.6),
    oscFreq:   0.4 + Math.random() * 0.9,
    oscPhase:  Math.random() * Math.PI * 2,
    oscAmp:    0.3 + Math.random() * 0.4,
    spinBoost: 0,
    scaredUntil: 0,
    // Birth-effect age in seconds. While < CUBE_BIRTH_DUR the cube is
    // drawn with a scale-in transform.
    birthT: 0,
  });

  // Pop-in burst — multi-stage so it reads as a real "materialize"
  // moment instead of a soft fade. Uses the same FX system as taps so
  // it auto-respects LITE_FX on low-end devices.
  //
  // 1) Tight bright ring (the cube "pops" into existence)
  ripples.push(new Ripple(x, y, 6,  Math.max(60,  size * 2.4), 0.75));
  // 2) Wider, slower ring trailing behind it
  ripples.push(new Ripple(x, y, 3,  Math.max(110, size * 4.5), 0.40));
  // 3) Initial spark shower (radial)
  const n1 = fx(14 + Math.floor(Math.random() * 6));
  for (let i = 0; i < n1; i++) {
    sparks.push(new Spark(x, y, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], true));
  }
  // 4) Delayed secondary puff to extend the moment a bit
  setTimeout(() => {
    ripples.push(new Ripple(x, y, 4, Math.max(80, size * 3.0), 0.45));
    const n2 = fx(8 + Math.floor(Math.random() * 4));
    for (let i = 0; i < n2; i++) {
      const ox = x + (Math.random() - 0.5) * size * 1.6;
      const oy = y + (Math.random() - 0.5) * size * 1.6;
      sparks.push(new Spark(ox, oy, SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)], 'contained'));
    }
  }, 140);
}

// Pop a cube on the spike row: visual burst + +100 score (animated chip).
function popCubeOnSpikes(c) {
  // Mini-explosion at the spike contact point.
  spawnExplode(c.x, c.y);
  state.pendingScore += CUBE_POP_BONUS;
  persist();
  // Flying +100 chip from the cube's position to the score chip.
  flyBonusCube(c.x, c.y, CUBE_POP_BONUS);
  vibrate([0, 30, 20, 50]);
}

// =============================================================
// Draw: GD-style scrolling background
// =============================================================
function drawBackground(dt) {
  state.bgScroll   = (state.bgScroll + dt * (W / 14)) % W;
  state.cubeAngle  += dt * 2.5;
  state.pulsePhase += dt * Math.PI * 2 * 1.6;

  // Spikes now sit directly on the bottom edge — no purple ground strip.
  const groundTop = H;

  // Scrolling cyan grid across the full stage height
  ctx.strokeStyle = 'rgba(174,232,255,0.33)';
  ctx.lineWidth = 1;
  const cell = 36;
  ctx.beginPath();
  const ox = -((state.bgScroll) % cell);
  for (let x = ox; x < W + cell; x += cell) {
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
  }
  for (let y = 0; y <= H; y += cell) {
    ctx.moveTo(0, y); ctx.lineTo(W, y);
  }
  ctx.stroke();

  // Floating rotating cyan cubes drifting freely across the whole stage.
  // Each cube has its own velocity and spin; they wrap around the edges.
  // 10 cubes start drifting at game start; after that, more only appear
  // while the player is actively growing tempo (one every 0.3s), and
  // popped cubes are NOT refilled.
  if (!state.bgCubes) {
    state.bgCubes  = [];
    state.bgCubesT = 0;
    state.cubeSpawnT = 0;
    for (let i = 0; i < 10; i++) {
      const ang = Math.random() * Math.PI * 2;
      const speed = 20 + Math.random() * 60; // 20..80 px/s
      state.bgCubes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        sx: 0, sy: 0,
        size: 18 + Math.random() * 16,
        rot: Math.random() * Math.PI * 2,
        baseSpin:  (Math.random() < 0.5 ? -1 : 1) * (0.4 + Math.random() * 0.6),
        oscFreq:   0.4 + Math.random() * 0.9,
        oscPhase:  Math.random() * Math.PI * 2,
        oscAmp:    0.3 + Math.random() * 0.4,
        spinBoost: 0,
        scaredUntil: 0,
      });
    }
  }
  state.bgCubesT += dt;

  // Spawn cadence: one new cube every 0.3s of accumulated growing-tempo
  // time. We only advance the timer while state.tempoGrowing is true, so
  // pauses or decay don't "queue up" cubes. Cap the on-screen population
  // so a long sustained burst can't flood the canvas.
  const CUBE_SPAWN_INTERVAL = 0.3;
  const CUBE_MAX = 100;
  if (state.tempoGrowing && state.bgCubes.length < CUBE_MAX) {
    state.cubeSpawnT += dt;
    while (state.cubeSpawnT >= CUBE_SPAWN_INTERVAL && state.bgCubes.length < CUBE_MAX) {
      state.cubeSpawnT -= CUBE_SPAWN_INTERVAL;
      spawnReplacementCube();
    }
  } else {
    // Reset accumulator so we don't get an instant spawn the moment
    // tempo starts growing again — each grow-streak starts fresh.
    state.cubeSpawnT = 0;
  }
  const tNow = state.bgCubesT;
  // Spike row sits on the bottom edge — its peaks reach H - hSpike (26).
  const SPIKE_HEIGHT = 26;
  // Both scare velocity and spin boost decay with the same half-life (~0.22s).
  const scareDecay = Math.exp(-dt * 3.2);
  let popped = 0;
  for (const c of state.bgCubes) {
    // Advance birth-effect age (used for scale-in render below).
    if (c.birthT !== undefined && c.birthT < CUBE_BIRTH_DUR) c.birthT += dt;

    c.x += (c.vx + c.sx) * dt;
    c.y += (c.vy + c.sy) * dt;
    c.sx *= scareDecay;
    c.sy *= scareDecay;
    c.spinBoost *= scareDecay;
    // Effective spin: base + slow oscillator + short-lived boost.
    const effSpin = c.baseSpin
                  + Math.sin(tNow * c.oscFreq + c.oscPhase) * c.oscAmp
                  + c.spinBoost;
    c.rot += effSpin * dt;
    // Bounce off screen edges (half-size keeps the whole cube on-screen).
    const half = c.size / 2;
    let bounced = false;
    if (c.x < half) {
      c.x = half;
      if (c.vx < 0) c.vx = -c.vx;
      if (c.sx < 0) c.sx = -c.sx;
      bounced = true;
    } else if (c.x > W - half) {
      c.x = W - half;
      if (c.vx > 0) c.vx = -c.vx;
      if (c.sx > 0) c.sx = -c.sx;
      bounced = true;
    }
    if (c.y < half) {
      c.y = half;
      if (c.vy < 0) c.vy = -c.vy;
      if (c.sy < 0) c.sy = -c.sy;
      bounced = true;
    } else if (c.y > H - half) {
      // Hit the spike row. If the player startled the cube within the
      // last ~1.5s AND it was moving downward at impact, it pops on
      // the spikes for +100 instead of bouncing.
      const wasScared  = (c.scaredUntil || 0) > tNow;
      const movingDown = (c.vy + c.sy) > 40;
      const onSpikes   = c.y >= (H - SPIKE_HEIGHT - half * 0.4);
      // Suppress the spike-pop during the brief birth animation so a
      // freshly spawned cube can't be killed before its grow-in finishes.
      const justBorn   = c.birthT !== undefined && c.birthT < CUBE_BIRTH_DUR;
      if (wasScared && movingDown && onSpikes && !justBorn) {
        c.dead = true;
        popCubeOnSpikes(c);
        popped++;
        continue;
      }
      c.y = H - half;
      if (c.vy > 0) c.vy = -c.vy;
      if (c.sy > 0) c.sy = -c.sy;
      bounced = true;
    }
    if (bounced) {
      // Wall hit → small random spin kick in a random direction.
      c.spinBoost += (Math.random() * 2 - 1) * 1.2;
    }

    // ---- Birth animation envelope -----------------------------------
    // While c.birthT < CUBE_BIRTH_DUR the cube is treated as "hatching":
    //   * scale grows 0 -> ~1.4 -> 1.0 (overshoot bounce)
    //   * extra rotation (one full spin layered onto its normal spin)
    //   * neon glow / shadowBlur falls off from very strong to none
    //   * a bright flash overlay covers the cube early on
    let birthScale = 1, birthAlpha = 1, birthExtraRot = 0,
        birthGlow  = 0, birthFlash = 0;
    if (c.birthT !== undefined && c.birthT < CUBE_BIRTH_DUR) {
      const u  = c.birthT / CUBE_BIRTH_DUR;            // 0..1
      const eo = 1 - Math.pow(1 - u, 3);                // ease-out cubic
      // Overshoot bounce: peaks at ~1.4 around u=0.55 then settles to 1.
      birthScale    = eo * (1 + 0.45 * Math.sin(u * Math.PI));
      birthAlpha    = Math.min(1, eo * 1.6);
      birthExtraRot = Math.PI * 2 * eo;                 // one full spin during birth
      birthGlow     = (1 - u) * 28;                     // shadow blur in px
      birthFlash    = Math.max(0, 1 - u * 2.2);         // bright overlay fades fast
    }

    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot + birthExtraRot);
    if (birthScale !== 1) ctx.scale(birthScale, birthScale);
    if (birthAlpha !== 1) ctx.globalAlpha = birthAlpha;
    if (birthGlow > 0) {
      ctx.shadowColor = '#7CF6FF';
      ctx.shadowBlur  = birthGlow;
    }
    ctx.fillStyle   = '#2EE6FF';
    ctx.fillRect(-half, -half, c.size, c.size);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(-half, -half, c.size, c.size);
    ctx.shadowBlur  = 0; // inner highlights shouldn't smear glow
    ctx.fillStyle   = 'rgba(255,255,255,0.4)';
    const inner = c.size * 0.28;
    ctx.fillRect(-inner, -inner, inner * 2, inner * 2);
    // Bright white flash overlay during the first ~half of birth.
    if (birthFlash > 0) {
      ctx.globalAlpha = birthFlash * (birthAlpha || 1);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-half, -half, c.size, c.size);
    }
    ctx.restore();
  }
  if (popped > 0) {
    // Compact the array (drop the cube that popped on the spikes).
    // We do NOT refill — new cubes only appear while tempo is growing.
    state.bgCubes = state.bgCubes.filter(c => !c.dead);
  }

  // Horizon glow fading up from the bottom of the screen
  const grad = ctx.createLinearGradient(0, groundTop - 80, 0, groundTop);
  grad.addColorStop(0,   'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(255,111,207,0.35)');
  grad.addColorStop(1,   'rgba(0,229,255,0.7)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundTop - 80, W, 80);

  // Cyan baseline along the very bottom
  ctx.fillStyle = '#00E5FF';
  ctx.fillRect(0, groundTop - 2, W, 2);

  // Scrolling pink spikes sitting on the bottom edge
  const baseW = 34, hSpike = 26, spacing = 46;
  const offset = -((state.bgScroll * 0.55) % spacing);
  ctx.fillStyle   = '#FF3E7F';
  ctx.strokeStyle = '#FFD3E4';
  ctx.lineWidth   = 1.5;
  for (let x = offset - spacing; x < W + spacing; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x - baseW / 2, groundTop);
    ctx.lineTo(x + baseW / 2, groundTop);
    ctx.lineTo(x, groundTop - hSpike);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Heat overlay — red alert when tempo is high
  if (state.heat > 0.001) {
    const pulse      = 0.5 + 0.5 * Math.sin(state.pulsePhase);
    const pulseMix   = state.heat * state.heat;
    const effectiveHeat = state.heat * (1 - 0.35 * pulseMix * (1 - pulse));

    // 1) Full-screen red tint, up to 75% opacity
    const tintA = effectiveHeat * 0.75;
    if (tintA > 0) {
      ctx.fillStyle = `rgba(229,0,26,${tintA})`;
      ctx.fillRect(0, 0, W, H);
    }
    // 2) Edge stripes (top + bottom)
    const stripeA = effectiveHeat;
    const g2 = ctx.createLinearGradient(0, 0, 0, H);
    g2.addColorStop(0,   `rgba(255,0,48,${stripeA})`);
    g2.addColorStop(0.3, 'rgba(0,0,0,0)');
    g2.addColorStop(0.7, 'rgba(0,0,0,0)');
    g2.addColorStop(1,   `rgba(255,0,48,${stripeA})`);
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);
    // 3) Radial vignette darkening toward edges
    const cx  = W / 2, cy = H / 2;
    const rad = Math.hypot(cx, cy);
    const g3  = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
    g3.addColorStop(0,    'rgba(0,0,0,0)');
    g3.addColorStop(0.35, 'rgba(0,0,0,0)');
    g3.addColorStop(1,    `rgba(176,0,16,${effectiveHeat})`);
    ctx.fillStyle = g3;
    ctx.fillRect(0, 0, W, H);
  }
}

// =============================================================
// Draw: Goose
// =============================================================
function applyTempoScale() {
  const ratio = Math.min(1, state.tempo / TEMPO_EXPLODE);
  state.gooseBaseScale = 1 - ratio * (1 - MIN_SCALE);
}
function applyHeat() {
  const r    = state.tempo / TEMPO_EXPLODE;
  let heat   = (r < 0.25) ? 0 : (r - 0.25) / 0.75;
  heat       = Math.max(0, Math.min(1, heat));
  state.heat = heat;
}

// Maximum downward offset the goose can reach. Picked so that at full
// tempo the bottom edge of the (already-shrunken) goose lands exactly on
// the spike tips at H - SPIKE_HEIGHT. Recomputed each frame because the
// goose scale, canvas height, and spike height drive it.
function gooseDescentTarget() {
  const ratio    = Math.min(1, state.tempo / TEMPO_EXPLODE);
  const baseY    = gooseCenter().y;
  const size     = gooseBaseSize();
  const scaleNow = 1 - ratio * (1 - MIN_SCALE); // matches applyTempoScale
  // Half the visual silhouette of the goose at the current scale.
  // SVG mode renders ~0.78 of `size` tall after the 1.30 fit factor;
  // PNG mode is similar. Use 0.40 as a conservative half-height factor.
  const halfH    = size * 0.40 * scaleNow;
  const SPIKE_HEIGHT = 26;
  // Target Y so that the goose's bottom kisses the spike tips.
  const targetCenterY = (H - SPIKE_HEIGHT) - halfH;
  return Math.max(0, targetCenterY - baseY);
}

// =============================================================
// Shake-driven goose physics: applies an impulse from device motion,
// integrates velocity with friction, and bounces off the canvas edges
// playing a synthesized 'bonk' on each wall hit.
// =============================================================
// Tuned so the goose flies fast and bounces several times after a strong
// shake before settling — "hockey puck on ice", not "goose in molasses".
const BUMP_FRICTION_PER_SEC = 0.9;     // gentle drag so motion lasts ~2-3 s
const BUMP_RESTITUTION       = 0.78;   // bounciness on wall hit — keeps energy
const BUMP_MIN_SPEED_FOR_FX  = 60;     // px/sec; below this no sound on wall hit
const BUMP_SOUND_COOLDOWN_MS = 60;     // anti-spam between bonk sounds

// Wall-hit sound: same quack used by taps so the audio palette stays
// consistent. AudioPool already handles muting, pitch jitter and pooling.
function playBonk(_intensity) {
  AudioPool.play();
}

// Apply an instantaneous velocity kick to the goose. Called from the
// devicemotion handler whenever motion delta is non-trivial — even small
// shakes push the goose so it feels alive, not floating in space.
function applyShakeImpulse(dx, dy, dz) {
  if (state.exploding || state.gooseHidden) return;
  // Strong scale: a typical hand shake (~25 m/s² delta) launches the goose
  // at ~1100 px/s, which crosses a 400px canvas in ~0.35s.
  const k = 45;
  state.gooseVX += -dx * k;        // phone moves right => goose lags left
  state.gooseVY += -dy * k;
  // Cap velocity so violent shakes don't teleport off-screen in one frame.
  const VMAX = 2600;
  if (state.gooseVX >  VMAX) state.gooseVX =  VMAX;
  if (state.gooseVX < -VMAX) state.gooseVX = -VMAX;
  if (state.gooseVY >  VMAX) state.gooseVY =  VMAX;
  if (state.gooseVY < -VMAX) state.gooseVY = -VMAX;
}

// Integrate velocity, slide, and bounce off canvas edges.
function stepGooseBump(dt) {
  if (state.exploding || state.gooseHidden) {
    state.gooseBumpX = state.gooseBumpY = 0;
    state.gooseVX    = state.gooseVY    = 0;
    state.bumpFlash  = Math.max(0, state.bumpFlash - dt * 4);
    return;
  }
  // Friction (exponential decay).
  const decay = Math.exp(-dt * BUMP_FRICTION_PER_SEC);
  state.gooseVX *= decay;
  state.gooseVY *= decay;
  // Integrate.
  state.gooseBumpX += state.gooseVX * dt;
  state.gooseBumpY += state.gooseVY * dt;
  // Compute bounds from the current goose footprint, leaving a small margin
  // so the goose never clips off-screen.
  const c     = gooseCenter();
  const size  = gooseBaseSize() * Math.max(state.gooseBaseScale, 0.15);
  const halfW = size * 0.40;
  const halfH = size * 0.42;
  const margin = 6;
  const minX = -(c.x - halfW - margin);
  const maxX =  (W - c.x - halfW - margin);
  const minY = -(c.y - halfH - margin);
  // Don't bounce off the spike row — stop short above it.
  const SPIKE_HEIGHT = 30;
  const maxY =  (H - SPIKE_HEIGHT - c.y - halfH - margin);
  const now  = performance.now();
  let hit = false, hitSpeed = 0;
  if (state.gooseBumpX < minX) {
    state.gooseBumpX = minX;
    hitSpeed = Math.max(hitSpeed, Math.abs(state.gooseVX));
    state.gooseVX = -state.gooseVX * BUMP_RESTITUTION;
    hit = true;
  } else if (state.gooseBumpX > maxX) {
    state.gooseBumpX = maxX;
    hitSpeed = Math.max(hitSpeed, Math.abs(state.gooseVX));
    state.gooseVX = -state.gooseVX * BUMP_RESTITUTION;
    hit = true;
  }
  if (state.gooseBumpY < minY) {
    state.gooseBumpY = minY;
    hitSpeed = Math.max(hitSpeed, Math.abs(state.gooseVY));
    state.gooseVY = -state.gooseVY * BUMP_RESTITUTION;
    hit = true;
  } else if (state.gooseBumpY > maxY) {
    state.gooseBumpY = maxY;
    hitSpeed = Math.max(hitSpeed, Math.abs(state.gooseVY));
    state.gooseVY = -state.gooseVY * BUMP_RESTITUTION;
    hit = true;
  }
  if (hit && hitSpeed > BUMP_MIN_SPEED_FOR_FX
      && now - state.lastBumpAt > BUMP_SOUND_COOLDOWN_MS) {
    state.lastBumpAt = now;
    const intensity = Math.min(1, hitSpeed / 900);
    AudioPool.play();
    vibrate(Math.round(15 + intensity * 35));
    state.bumpFlash = Math.min(1, 0.4 + intensity * 0.6);
    // Hard wall hits award score — the goose smashing into the edges should
    // feel rewarding, not just decorative. Cooldown-gated so a fast-bouncing
    // fling can't spam points; capped to +2 even on the strongest impact.
    if (hitSpeed >= BUMP_SCORE_MIN_SPEED
        && now - state.lastBumpScoreAt > BUMP_SCORE_COOLDOWN_MS
        && !state.exploding) {
      state.lastBumpScoreAt = now;
      const pts = (hitSpeed >= BUMP_SCORE_VMAX_BONUS) ? 2 : 1;
      // Wall-hit scoring is silent visually — no flying +1 chip. The bump
      // flash + AudioPool.play above already provide feedback, and the
      // score readout pulses inside onPointArrived. We bypass pendingScore
      // entirely (taps use pending -> chip arrives -> onPointArrived; we
      // skip the chip, so we go direct to onPointArrived which increments
      // state.score and persists).
      for (let i = 0; i < pts; i++) onPointArrived();
    }
  }
  state.bumpFlash = Math.max(0, state.bumpFlash - dt * 3.5);
}

// Smoothly drive gooseDescentY toward its target, plus a small nervous
// horizontal sway whose amplitude scales with tempo.
function stepGooseDescent(dt) {
  if (state.exploding || state.gooseHidden) {
    state.gooseDescentY = 0;
    state.gooseSwayX    = 0;
    return;
  }
  // While the user is actively dragging the goose, freeze sway and descent
  // so the grabbed point stays locked under the finger. They resume the
  // moment the drag ends.
  if (typeof _drag !== 'undefined' && _drag && _drag.started) return;
  const target = gooseDescentTarget() * Math.min(1, state.tempo / TEMPO_EXPLODE);
  // Critically-damped-ish lerp: ~0.35s settling time.
  const k = 1 - Math.exp(-dt / 0.18);
  state.gooseDescentY += (target - state.gooseDescentY) * k;
  // Sway: amplitude grows with tempo; frequency stays comfy ~1.6 Hz.
  state.gooseSwayT += dt;
  const ratio = Math.min(1, state.tempo / TEMPO_EXPLODE);
  const amp   = 14 * ratio;
  state.gooseSwayX = Math.sin(state.gooseSwayT * 10.0) * amp;
}

// Returns true when the descended-and-scaled goose silhouette touches the
// spike row. Used to fire triggerExplode() on physical contact instead of
// when the tempo bar simply hits 1.0.
function gooseTouchingSpikes() {
  if (state.exploding || state.gooseHidden) return false;
  const SPIKE_HEIGHT = 26;
  const baseY    = gooseCenter().y;
  const size     = gooseBaseSize();
  const scaleNow = state.gooseBaseScale * Math.max(state.gooseAnimScaleY, 0.0001);
  const halfH    = size * 0.40 * Math.abs(scaleNow);
  const bottomY  = baseY + state.gooseDescentY + halfH;
  // 2px contact tolerance — the descent lerp asymptotes near the spike
  // tips and a strict equality misses the impact frame.
  return bottomY >= (H - SPIKE_HEIGHT) - 2;
}

// =============================================================
// SVG goose — vector rendering ported 1:1 from GooseView.java
// All paths live in a 300x400 viewBox; drawGoose() wraps this
// with the same outer scale/rotate/translate used by PNG mode.
// =============================================================
const SVG_C_BODY   = '#FFFFFF';
const SVG_C_BEAK   = '#FF9A2B';
const SVG_C_FOOT   = '#FF9A2B';
const SVG_C_LINE   = '#1A1A1A';
const SVG_C_EYEBG  = '#FFFFFF';
const SVG_C_PUPIL  = '#111111';
const SVG_C_BLUSH  = 'rgba(255,200,176,0.6)';
const SVG_C_HIGHLT = '#FFFFFF';
const SVG_C_MOUTH  = '#6A2B00';

const SVG_WING_LINES = [
  [115, 270, 140, 280, 165, 275],
  [135, 285, 160, 293, 185, 288],
  [108, 250, 135, 258, 160, 253],
];

// Build each sub-path once as a Path2D for cheap per-frame fills/strokes.
function _mkPath(build) {
  const p = new Path2D();
  build(p);
  p.closePath();
  return p;
}
const SVG_PATH_BODY = _mkPath(p => {
  p.moveTo(70, 270);
  p.bezierCurveTo(40, 255,   45, 200,   88, 178);
  p.bezierCurveTo(125, 160, 185, 162,  220, 192);
  p.bezierCurveTo(252, 220, 250, 282,  218, 312);
  p.bezierCurveTo(192, 328, 155, 330,  125, 325);
  p.bezierCurveTo(98, 318,   78, 295,  70, 270);
});
const SVG_PATH_TAIL = _mkPath(p => {
  // Three overlapping feathers fanning out back-left from the body.
  // feather 1 (top)
  p.moveTo(80, 202);
  p.bezierCurveTo(50, 180, 22, 170, 14, 182);
  p.bezierCurveTo(18, 200, 40, 215, 72, 218);
  // feather 2 (middle)
  p.moveTo(72, 218);
  p.bezierCurveTo(42, 220, 18, 218, 10, 232);
  p.bezierCurveTo(18, 248, 42, 252, 70, 246);
  // feather 3 (bottom)
  p.moveTo(70, 246);
  p.bezierCurveTo(45, 254, 26, 262, 22, 275);
  p.bezierCurveTo(32, 282, 52, 278, 70, 265);
});
const SVG_PATH_NECK = _mkPath(p => {
  p.moveTo(135, 185);
  p.bezierCurveTo(108, 160, 115, 115, 150, 90);
  p.bezierCurveTo(175, 75,  205, 75,  222, 95);
  p.bezierCurveTo(225, 105, 218, 112, 208, 112);
  p.bezierCurveTo(185, 112, 170, 135, 172, 170);
  p.bezierCurveTo(170, 182, 150, 192, 135, 185);
});
const SVG_PATH_WING = _mkPath(p => {
  p.moveTo(100, 225);
  p.bezierCurveTo(130, 210, 180, 215, 210, 240);
  p.bezierCurveTo(220, 265, 195, 295, 160, 295);
  p.bezierCurveTo(130, 293, 105, 275, 95, 250);
  p.bezierCurveTo(92, 240,  95, 230, 100, 225);
});
const SVG_PATH_BEAK_TOP = _mkPath(p => {
  p.moveTo(245, 80);
  p.bezierCurveTo(270, 74, 288, 78, 293, 86);
  p.bezierCurveTo(288, 90, 270, 90, 252, 90);
  p.bezierCurveTo(246, 88, 243, 84, 245, 80);
});
const SVG_PATH_BEAK_BOT = _mkPath(p => {
  p.moveTo(252, 92);
  p.bezierCurveTo(268, 94, 285, 93, 290, 90);
  p.bezierCurveTo(287, 98, 272, 102, 258, 100);
  p.bezierCurveTo(251, 98, 249, 94, 252, 92);
});
const SVG_PATH_FOOT_BACK = _mkPath(p => {
  p.moveTo(105, 358);
  p.quadraticCurveTo(115, 350, 128, 352);
  p.quadraticCurveTo(145, 354, 152, 362);
  p.quadraticCurveTo(147, 370, 136, 372);
  p.quadraticCurveTo(120, 374, 110, 370);
  p.quadraticCurveTo(102, 366, 105, 358);
});
const SVG_PATH_FOOT_FRONT = _mkPath(p => {
  p.moveTo(150, 365);
  p.quadraticCurveTo(160, 355, 172, 357);
  p.quadraticCurveTo(190, 358, 200, 366);
  p.quadraticCurveTo(196, 376, 182, 378);
  p.quadraticCurveTo(166, 380, 158, 376);
  p.quadraticCurveTo(148, 372, 150, 365);
});

function _svgLegLift(phase, offset) {
  let p = (phase + offset) % 1;
  if (p < 0) p += 1;
  if (p < 0.5) return Math.sin(p * 2 * Math.PI) * 0.5;
  return 0;
}

function _svgStrokedPath(g, path, width) {
  g.lineWidth   = width;
  g.strokeStyle = SVG_C_LINE;
  g.lineJoin    = 'round';
  g.lineCap     = 'round';
  g.stroke(path);
}

function _svgFillCircle(g, cx, cy, r, fill) {
  g.fillStyle = fill;
  g.beginPath();
  g.arc(cx, cy, r, 0, Math.PI * 2);
  g.fill();
}

function _svgStrokeCircle(g, cx, cy, r, width) {
  g.lineWidth   = width;
  g.strokeStyle = SVG_C_LINE;
  g.beginPath();
  g.arc(cx, cy, r, 0, Math.PI * 2);
  g.stroke();
}

function _svgFillEllipse(g, cx, cy, rx, ry, fill) {
  g.fillStyle = fill;
  g.beginPath();
  g.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  g.fill();
}

function _svgStrokeEllipse(g, cx, cy, rx, ry, width) {
  g.lineWidth   = width;
  g.strokeStyle = SVG_C_LINE;
  g.beginPath();
  g.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  g.stroke();
}

function _svgDrawEye(g, cx, cy, rOuter, rPupil, highlight, sadness) {
  _svgFillCircle(g, cx, cy, rOuter, SVG_C_EYEBG);
  _svgStrokeCircle(g, cx, cy, rOuter, 2);
  const pxOff = rOuter * 0.25;
  const pyOff = sadness * rOuter * 0.5;
  _svgFillCircle(g, cx + pxOff, cy + pyOff, rPupil, SVG_C_PUPIL);
  if (highlight) {
    _svgFillCircle(g, cx - rOuter * 0.25, cy - rOuter * 0.4, 1.3, SVG_C_HIGHLT);
  }
}

function _svgDrawLeg(g, x1, y1, x2, y2, footPath, baseLineW) {
  // Leg stem
  g.lineWidth   = 6;
  g.strokeStyle = SVG_C_LINE;
  g.lineJoin    = 'round';
  g.lineCap     = 'round';
  g.beginPath();
  g.moveTo(x1, y1);
  g.lineTo(x2, y2);
  g.stroke();
  // Foot fill + outline
  g.fillStyle = SVG_C_FOOT;
  g.fill(footPath);
  _svgStrokedPath(g, footPath, baseLineW);
}

// Render the goose in local 300x400 coordinates. Caller must have
// already scaled the context so these coordinates map to the goose size.
function drawGooseSvg(g) {
  const lineW  = 3;
  const twoPi  = Math.PI * 2;
  const phase  = (performance.now() / 700) % 1;
  const sadness = state.sadness;

  const frontLift = _svgLegLift(phase, 0.0);
  const backLift  = _svgLegLift(phase, 0.5);

  // Back leg (behind body)
  g.save();
  g.translate(0, -backLift * 10);
  _svgDrawLeg(g, 130, 318, 128, 358, SVG_PATH_FOOT_BACK, lineW);
  g.restore();

  // Body + tail
  g.fillStyle = SVG_C_BODY;
  g.fill(SVG_PATH_BODY);
  g.fill(SVG_PATH_TAIL);
  _svgStrokedPath(g, SVG_PATH_BODY, lineW);
  _svgStrokedPath(g, SVG_PATH_TAIL, lineW);

  // Wing outline + feather lines
  _svgStrokedPath(g, SVG_PATH_WING, lineW);
  g.lineWidth   = 2.2;
  g.strokeStyle = SVG_C_LINE;
  for (const ln of SVG_WING_LINES) {
    g.beginPath();
    g.moveTo(ln[0], ln[1]);
    g.quadraticCurveTo(ln[2], ln[3], ln[4], ln[5]);
    g.stroke();
  }

  // Head + neck with subtle vertical bob
  const headBob = Math.sin(twoPi * phase) * 1.2 * (1 - sadness);
  g.save();
  g.translate(0, headBob);

  g.fillStyle = SVG_C_BODY;
  g.fill(SVG_PATH_NECK);
  _svgStrokedPath(g, SVG_PATH_NECK, lineW);

  // Head oval (218, 85) rx=36 ry=32
  _svgFillEllipse(g, 218, 85, 36, 32, SVG_C_BODY);
  _svgStrokeEllipse(g, 218, 85, 36, 32, lineW);
  // Blush
  _svgFillEllipse(g, 202, 100, 7, 3.5, SVG_C_BLUSH);

  // Upper beak + nostril
  g.fillStyle = SVG_C_BEAK;
  g.fill(SVG_PATH_BEAK_TOP);
  _svgStrokedPath(g, SVG_PATH_BEAK_TOP, lineW);
  _svgFillCircle(g, 278, 82, 1.6, SVG_C_LINE);

  // Lower beak opens when quacking; reveals mouth patch
  const beakOpen = state.quack ? 6 : 0;
  g.save();
  g.translate(0, beakOpen);
  g.fillStyle = SVG_C_BEAK;
  g.fill(SVG_PATH_BEAK_BOT);
  _svgStrokedPath(g, SVG_PATH_BEAK_BOT, lineW);
  if (state.quack) {
    g.save();
    g.translate(0, -beakOpen);
    // Mouth oval spanning (250..288, 88..96)
    g.fillStyle = SVG_C_MOUTH;
    g.beginPath();
    g.ellipse((250 + 288) / 2, (88 + 96) / 2, (288 - 250) / 2, (96 - 88) / 2, 0, 0, Math.PI * 2);
    g.fill();
    g.restore();
  }
  g.restore();

  // Eyes (left small, right bigger with highlight)
  _svgDrawEye(g, 202, 75, 4.5, 2.2, false, sadness);
  _svgDrawEye(g, 222, 73, 7.5, 3.5, true,  sadness);

  g.restore(); // end head/neck bob

  // Front leg (in front of body)
  g.save();
  g.translate(0, -frontLift * 10);
  _svgDrawLeg(g, 168, 322, 172, 365, SVG_PATH_FOOT_FRONT, lineW);
  g.restore();
}

function drawGoose() {
  if (state.gooseHidden) return;
  const c    = gooseCenter();
  const size = gooseBaseSize();
  ctx.save();
  ctx.globalAlpha = state.gooseAlpha;
  ctx.translate(
    c.x + state.gooseSwayX + state.gooseBumpX,
    c.y + state.gooseAnimTranslateY + state.gooseDescentY + state.gooseBumpY
  );
  ctx.rotate(state.gooseAnimRotation);
  const sx = state.gooseBaseScale * state.gooseAnimScaleX;
  const sy = state.gooseBaseScale * state.gooseAnimScaleY;
  ctx.scale(sx, sy);
  const drawW = size, drawH = size;

  // Sadness: desaturate and dim via CSS filter
  if (state.sad) {
    ctx.filter = 'saturate(0.5) brightness(0.85)';
  }

  if (state.gooseStyle === 1) {
    // SVG mode: fit 300x400 viewBox so the rendered goose looks the same
    // size as the PNG. The PNG fills ~full width of `size`, while the SVG
    // body only occupies x≈40..293 (≈253/300 of the viewBox width), so we
    // upscale by ~1.18x to roughly match. vbH (400) dominates after scaling.
    const vbW = 300, vbH = 400;
    const svgScale = (size / vbH) * 1.30;
    ctx.save();
    ctx.scale(svgScale, svgScale);
    ctx.translate(-vbW / 2, -vbH / 2);
    drawGooseSvg(ctx);
    ctx.restore();
  } else {
    const img = state.quack ? gooseBodyQuack : gooseBody;
    if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
    } else if (gooseImg && gooseImg.complete && gooseImg.naturalWidth) {
      ctx.drawImage(gooseImg, -drawW / 2, -drawH / 2, drawW, drawH);
    } else {
      // Fallback placeholder while images are loading
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, drawW * 0.4, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.filter = 'none';
  ctx.restore();
}

// =============================================================
// Goose squash animation — keyframes matching Android animateGoose()
// =============================================================
function animateGoose() {
  // Base scale is controlled by gooseBaseScale; we animate multipliers only.
  const wobble = (Math.random() < 0.5 ? -1 : 1) * (6 + Math.random() * 4) * Math.PI / 180;
  // Three phases: compress (70ms), stretch-up (140ms), return with overshoot (180ms)
  state.animQueue = {
    phase: 0, t: 0,
    phases: [
      { dur: 0.07, from: { sx:1,    sy:1,    ty:0,   rot:0            }, to: { sx:0.86, sy:0.92, ty:0,   rot: wobble         } },
      { dur: 0.14, from: { sx:0.86, sy:0.92, ty:0,   rot: wobble      }, to: { sx:1.08, sy:0.95, ty:-45, rot: -wobble * 0.6  } },
      { dur: 0.18, from: { sx:1.08, sy:0.95, ty:-45, rot:-wobble*0.6  }, to: { sx:1,    sy:1,    ty:0,   rot: 0              }, overshoot: true },
    ]
  };
}

function updateGooseAnim(dt) {
  const aq = state.animQueue;
  if (!aq) {
    state.gooseAnimScaleX     = 1;
    state.gooseAnimScaleY     = 1;
    state.gooseAnimTranslateY = 0;
    state.gooseAnimRotation   = 0;
    return;
  }
  aq.t += dt;
  const ph = aq.phases[aq.phase];
  let p    = Math.min(1, aq.t / ph.dur);
  let ep;
  if (ph.overshoot) {
    // OvershootInterpolator: (t-1)^2 * ((tension+1)(t-1) + tension) + 1 ; tension = 2.5
    const s = 2.5;
    const tt = p - 1;
    ep = tt * tt * ((s + 1) * tt + s) + 1;
  } else {
    // Accelerate-decelerate via cosine
    ep = (Math.cos((1 - p) * Math.PI) + 1) / 2;
  }
  const fromV = ph.from, toV = ph.to;
  state.gooseAnimScaleX     = fromV.sx  + (toV.sx  - fromV.sx)  * ep;
  state.gooseAnimScaleY     = fromV.sy  + (toV.sy  - fromV.sy)  * ep;
  state.gooseAnimTranslateY = fromV.ty  + (toV.ty  - fromV.ty)  * ep;
  state.gooseAnimRotation   = fromV.rot + (toV.rot - fromV.rot) * ep;
  if (p >= 1) {
    aq.phase++;
    aq.t = 0;
    if (aq.phase >= aq.phases.length) state.animQueue = null;
  }
}

// Render the deer in local 300x400 coordinates (caller must scale).
function drawDeerSvg(g) {
  // Body fills
  g.fillStyle = DEER_C_BODY;  g.fill(DEER_BODY);
  g.fillStyle = DEER_C_BELLY; g.fill(DEER_BELLY);
  g.fillStyle = DEER_C_BODY;  g.fill(DEER_NECK); g.fill(DEER_HEAD); g.fill(DEER_SNOUT);
  g.fillStyle = DEER_C_EAR;   g.fill(DEER_EAR);
  g.fillStyle = DEER_C_BODY;  g.fill(DEER_TAIL);

  // Outlines
  _deerStrokePath(g, DEER_BODY,  3,   DEER_C_LINE);
  _deerStrokePath(g, DEER_BELLY, 2,   DEER_C_LINE);
  _deerStrokePath(g, DEER_NECK,  3,   DEER_C_LINE);
  _deerStrokePath(g, DEER_HEAD,  3,   DEER_C_LINE);
  _deerStrokePath(g, DEER_SNOUT, 2.5, DEER_C_LINE);
  _deerStrokePath(g, DEER_EAR,   2.5, DEER_C_LINE);
  _deerStrokePath(g, DEER_TAIL,  2.5, DEER_C_LINE);

  // Antlers
  _deerStrokePath(g, DEER_ANTLER_L, 4, DEER_C_HORN);
  _deerStrokePath(g, DEER_ANTLER_R, 4, DEER_C_HORN);

  // Legs
  _deerStrokePath(g, DEER_LEGS, 6, DEER_C_LINE);
  g.fillStyle = DEER_C_LINE; g.fill(DEER_HOOVES);

  // Eye
  g.fillStyle = DEER_C_EYEBG;
  g.beginPath(); g.arc(248, 113, 5, 0, Math.PI * 2); g.fill();
  g.lineWidth = 1.5; g.strokeStyle = DEER_C_LINE; g.stroke();
  g.fillStyle = DEER_C_PUPIL;
  g.beginPath(); g.arc(250, 114, 2.5, 0, Math.PI * 2); g.fill();

  // Nose
  g.fillStyle = DEER_C_NOSE;
  g.beginPath(); g.arc(284, 128, 2.4, 0, Math.PI * 2); g.fill();
}

function spawnDeer(x, y) {
  state.deer = {
    phase: 'hatch',
    t: 0,
    x: x,
    y: y,
    vx: (Math.random() * 2 - 1) * 30,   // small horizontal drift
    vy: 0,                                // accelerates upward in fly phase
    rot: 0,
  };
}

function updateDeer(dt) {
  const d = state.deer;
  if (!d) return;
  d.t += dt;
  if (d.phase === 'hatch') {
    // 0.45s of pop-in. Once fully scaled, switch to flight.
    if (d.t >= 0.45) {
      d.phase = 'fly';
      d.t = 0;
      d.vy = -180;
    }
  } else if (d.phase === 'fly') {
    // Gentle upward acceleration + side-to-side wobble for character.
    d.vy -= 360 * dt;                             // accelerate upward
    d.vx += Math.sin(d.t * 4) * 80 * dt;          // sway
    d.x  += d.vx * dt;
    d.y  += d.vy * dt;
    // Bank into the direction of motion (visual lean).
    d.rot = Math.max(-0.45, Math.min(0.45, d.vx / 220));
    // Once the deer clears the top of the canvas with margin, end the
    // cutscene and respawn the goose.
    if (d.y < -200) {
      state.deer = null;
      startRespawn();
    }
  }
}

function drawDeer() {
  const d = state.deer;
  if (!d) return;
  const cv = document.getElementById('cv');
  // Local box is 300x400. Draw at the same on-screen size as the goose.
  const targetH = Math.min(cv.height * 0.5, 420);
  const scale   = targetH / 400;
  let popScale  = 1;
  if (d.phase === 'hatch') {
    const p  = Math.min(1, d.t / 0.45);
    const s  = 2.2;
    const tt = p - 1;
    const ep = tt * tt * ((s + 1) * tt + s) + 1;
    popScale = 0.15 + (1 - 0.15) * ep;
  }
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.rotate(d.rot);
  ctx.scale(scale * popScale, scale * popScale);
  // Center the 300x400 viewBox on (d.x, d.y).
  ctx.translate(-150, -200);
  drawDeerSvg(ctx);
  ctx.restore();
}
function updateRespawn(dt) {
  if (state.respawnT >= 1) return;
  state.respawnT = Math.min(1, state.respawnT + dt / 0.32);
  const p = state.respawnT;
  // Overshoot scale pop-in
  const s  = 2.2;
  const tt = p - 1;
  const ep = tt * tt * ((s + 1) * tt + s) + 1;
  const scale = 0.2 + (1 - 0.2) * ep;
  state.gooseAnimScaleX = scale;
  state.gooseAnimScaleY = scale;
  state.gooseAlpha      = Math.min(1, p * 2);
  if (p >= 1) {
    state.gooseAlpha  = 1;
    state.exploding   = false;
  }
}

  motivEl.classList.remove('show', 'pulse');

function updateMotivation() {
  const ratio = state.tempo / TEMPO_EXPLODE;
  let tier, pool;
  if (ratio < 0.25) {
    hideMotivation();
    state.lastMotivationTier = -1;
    return;
  } else if (ratio < 0.5)  { tier = 0; pool = t('motiv_start'); }
  else if (ratio < 0.75)   { tier = 1; pool = t('motiv_mid');   }
  else if (ratio < 0.92)   { tier = 2; pool = t('motiv_high');  }
  else                     { tier = 3; pool = t('motiv_boom');   }

  if (tier === state.lastMotivationTier) return;
  state.lastMotivationTier = tier;
  let idx = Math.floor(Math.random() * pool.length);
  if (idx === state.lastMotivationIdx && pool.length > 1) idx = (idx + 1) % pool.length;
  state.lastMotivationIdx = idx;
  setMotivation(pool[idx], tier);
}

// Flying +1 point animation — travels from tap position to score chip
// =============================================================
const stage = document.getElementById('stage');

function flyPointToScore(startX, startY) {
  // Skip the DOM fly animation when too many are already in flight — awards the point directly.
  if (document.querySelectorAll('.fly-plus').length >= MAX_FLY_PLUS) {
    onPointArrived();
    return;
  }
  const plus = document.createElement('div');
  plus.className = 'fly-plus';
  plus.innerHTML = `<svg viewBox="0 0 34 34" width="34" height="34" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="30" height="30" rx="6" fill="#FFD23E" stroke="#fff" stroke-width="2"/>
    <text x="17" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#2a0f6b">+1</text>
  </svg>`;
  stage.appendChild(plus);

  const stageRect = stage.getBoundingClientRect();
  const scoreRect = scoreEl.getBoundingClientRect();
  const x0 = startX - 17;
  const y0 = startY - 17;
  const x1 = (scoreRect.left - stageRect.left) + scoreRect.width  / 2 - 17;
  const y1 = (scoreRect.top  - stageRect.top)  + scoreRect.height / 2 - 17;
  const ctrlX = (x0 + x1) / 2 + (Math.random() - 0.5) * 140;
  const ctrlY = Math.min(y0, y1) - 200;
  const spin  = (Math.random() < 0.5 ? -1 : 1) * (540 + Math.random() * 360);

  const dur    = 560;
  const startT = performance.now();
  let lastSparkT = -1;
  function step(now) {
    const t = Math.min(1, (now - startT) / dur);
    // Slightly accelerating ease
    const eased = Math.pow(t, 1.3);
    const om    = 1 - eased;
    const bx    = om*om * x0 + 2*om*eased*ctrlX + eased*eased * x1;
    const by    = om*om * y0 + 2*om*eased*ctrlY + eased*eased * y1;
    const scale = 0.4 + 1.1 * eased - 0.45 * eased * eased;
    plus.style.transform = `translate(${bx}px,${by}px) scale(${scale}) rotate(${spin * eased}deg)`;
    plus.style.opacity   = Math.min(1, t * 5);
    // Trailing sparks only on non-lite devices — they compound heavily
    // on Safari (desktop + iOS) and mobile, tanking the frame rate.
    if (!LITE_FX && eased - lastSparkT > 0.05) {
      spawnSpark(bx + 17, by + 17);
      lastSparkT = eased;
    }
    if (t < 1) requestAnimationFrame(step);
    else {
      spawnBurst(x1 + 17, y1 + 17);
      plus.remove();
      onPointArrived();
    }
  }
  requestAnimationFrame(step);
}

function flyBonusCube(startX, startY, value) {
  // Size scales with digit count so a +10000 bonus cube doesn't crop its text.
  const label   = '+' + fmtNum(value);
  const digits  = label.length;
  const size    = Math.max(40, 18 + digits * 12); // 40 for "+1".."+999", grows for big values
  const half    = size / 2;
  const fontPx  = Math.round(size * 0.42);
  const padding = Math.max(2, Math.round(size * 0.05));
  const inner   = size - padding * 2;
  const radius  = Math.round(size * 0.18);

  const plus = document.createElement('div');
  plus.className = 'fly-plus';
  plus.style.width = size + 'px'; plus.style.height = size + 'px';
  plus.innerHTML = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${padding}" y="${padding}" width="${inner}" height="${inner}" rx="${radius}" fill="#FF3E7F" stroke="#fff" stroke-width="2.5"/>
    <text x="${half}" y="${half + fontPx * 0.36}" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="${fontPx}" fill="#fff">${label}</text>
  </svg>`;
  stage.appendChild(plus);

  const stageRect = stage.getBoundingClientRect();
  const scoreRect = scoreEl.getBoundingClientRect();
  const x0 = startX - half;
  const y0 = startY - half;
  const x1 = (scoreRect.left - stageRect.left) + scoreRect.width  / 2 - half;
  const y1 = (scoreRect.top  - stageRect.top)  + scoreRect.height / 2 - half;
  const ctrlX = (x0 + x1) / 2 + (Math.random() - 0.5) * 220;
  const ctrlY = Math.min(y0, y1) - 260;
  const spin  = (Math.random() < 0.5 ? -1 : 1) * (720 + Math.random() * 360);
  const dur   = 700 + Math.random() * 300;
  const startT = performance.now();
  let lastSparkT = -1;
  function step(now) {
    const t     = Math.min(1, (now - startT) / dur);
    const eased = Math.pow(t, 1.3);
    const om    = 1 - eased;
    const bx    = om*om * x0 + 2*om*eased*ctrlX + eased*eased * x1;
    const by    = om*om * y0 + 2*om*eased*ctrlY + eased*eased * y1;
    const scale = 0.4 + 1.1 * eased - 0.45 * eased * eased;
    plus.style.transform = `translate(${bx}px,${by}px) scale(${scale}) rotate(${spin * eased}deg)`;
    plus.style.opacity   = Math.min(1, t * 5);
    if (!LITE_FX && eased - lastSparkT > 0.05) {
      spawnSpark(bx + half, by + half);
      lastSparkT = eased;
    }
    if (t < 1) requestAnimationFrame(step);
    else {
      spawnBurst(x1 + half, y1 + half);
      plus.remove();
      onBonusArrived(value);
    }
  }
  requestAnimationFrame(step);
}
